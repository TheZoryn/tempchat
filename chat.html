<!DOCTYPE html>
<html>
<head>
  <title>Temp Chat</title>

  <style>
    :root {
      --bg: #0f0f10;
      --text: #ffffff;
      --box: #2b2d31;
      --me: #5865f2;
      --input: #1e1f22;
    }

    body.light {
      --bg: #f2f2f2;
      --text: #111;
      --box: #e4e6eb;
      --me: #4f46e5;
      --input: #ffffff;
    }

    body {
      margin: 0;
      font-family: system-ui;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      padding: 12px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #chat {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 70%;
    }

    .name {
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 2px;
    }

    .text {
      padding: 8px 12px;
      border-radius: 12px;
    }

    .me {
      align-self: flex-end;
    }

    .other {
      align-self: flex-start;
    }

    .me .text {
      background: var(--me);
      color: white;
    }

    .other .text {
      background: var(--box);
    }

    .inputBox {
      display: flex;
      padding: 10px;
      border-top: 1px solid #222;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: var(--input);
      color: var(--text);
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 20px;
      background: var(--me);
      color: white;
      cursor: pointer;
    }

    .toggle {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 10px;
      cursor: pointer;
      background: var(--box);
    }
  </style>
</head>

<body>

<div class="header">
  <div>
    <div id="roomName"></div>
    <div id="userName" style="font-size:12px; opacity:0.6;"></div>
  </div>
  <div class="toggle" id="themeToggle">Toggle Theme</div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type a message..." />
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain: "temp-chat-6f08b.firebaseapp.com",
  projectId: "temp-chat-6f08b",
  storageBucket: "temp-chat-6f08b.firebasestorage.app",
  messagingSenderId: "388611361050",
  appId: "1:388611361050:web:1db50e9927a3bc794e84a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Get user + room
const params = new URLSearchParams(window.location.search);
const username = params.get("user") || localStorage.getItem("username");
const room = params.get("room") || localStorage.getItem("room");

if (!username || !room) {
  window.location.href = "index.html";
}

document.getElementById("roomName").innerText = "Room: " + room;
document.getElementById("userName").innerText = "You: " + username;

// Firestore path
const chatRef = collection(db, "rooms", room, "messages");

// Send message
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  await addDoc(chatRef, {
    text: text,
    user: username,
    time: Date.now()
  });

  input.value = "";
}

// Button click
document.getElementById("sendBtn").addEventListener("click", send);

// Enter key
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

// Live messages
const q = query(chatRef, orderBy("time"));

onSnapshot(q, (snapshot) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  snapshot.forEach((doc) => {
    const m = doc.data();

    const div = document.createElement("div");
    div.className = "msg " + (m.user === username ? "me" : "other");

    div.innerHTML = `
      <div class="name">${m.user}</div>
      <div class="text">${m.text}</div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

// 🌗 Theme toggle
const toggle = document.getElementById("themeToggle");

// load saved theme
if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
}

toggle.onclick = () => {
  document.body.classList.toggle("light");

  if (document.body.classList.contains("light")) {
    localStorage.setItem("theme", "light");
  } else {
    localStorage.setItem("theme", "dark");
  }
};
</script>

</body>
</html>
