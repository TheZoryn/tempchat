<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp Chat</title>

<style>
:root{
  --bg:#0b1020;
  --text:#fff;
  --box:#1e293b;
  --me:#6366f1;
}
body.light{
  --bg:#f3f6fb;
  --text:#111;
  --box:#ffffff;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:var(--box);
  align-items:center;
}
#info{font-size:12px;opacity:.7}

/* chat */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.msg{max-width:75%}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}

.name{
  font-size:11px;
  font-weight:bold;
}
.bubble{
  padding:10px;
  border-radius:12px;
  background:var(--box);
}
.me .bubble{
  background:var(--me);
  color:#fff;
}

/* input */
.inputBox{
  display:flex;
  padding:8px;
  gap:6px;
  background:var(--box);
}
input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}
button{padding:10px;border:none;border-radius:20px}

/* canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">
  <div id="info"></div>
  <div>
    <select id="effect">
      <option value="none">None</option>
      <option value="snow">Snow</option>
      <option value="rain">Rain</option>
      <option value="thunder">Thunder</option>
    </select>
    <button id="theme">🌙</button>
  </div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Message...">
  <button id="send">Send</button>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,collection,addDoc,query,orderBy,onSnapshot,
doc,getDoc,setDoc,updateDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain:"temp-chat-6f08b.firebaseapp.com",
  projectId:"temp-chat-6f08b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* params */
const p=new URLSearchParams(location.search);
const user=p.get("user");
const room=p.get("room");

/* UI */
const chat=document.getElementById("chat");
const msg=document.getElementById("msg");
const info=document.getElementById("info");

/* gradient */
function grad(name){
  const g=[
["#ff7eb3","#ff758c"],
["#7afcff","#00c6ff"],
["#fbc2eb","#a6c1ee"],
["#fddb92","#d1fdff"],
["#84fab0","#8fd3f4"]
];
return g[name.length%g.length];
}

/* room */
const roomRef=doc(db,"rooms",room);
await setDoc(roomRef,{createdAt:Date.now()},{merge:true});

/* presence */
const presRef=doc(db,"rooms",room,"presence",user);
await setDoc(presRef,{online:true});

window.onbeforeunload=()=>deleteDoc(presRef);

/* online users */
onSnapshot(collection(db,"rooms",room,"presence"),snap=>{
  let users=[];
  snap.forEach(d=>users.push(d.id));
  info.innerText=`${room} • ${users.length} online`;
});

/* messages */
const ref=collection(db,"rooms",room,"messages");

async function send(){
  const t=msg.value.trim();
  if(!t)return;
  await addDoc(ref,{
    user,text:t,time:Date.now(),seenBy:[user]
  });
  msg.value="";
}

send.onclick=send;
msg.onkeypress=e=>{if(e.key==="Enter")send()};

/* listen */
onSnapshot(query(ref,orderBy("time")),snap=>{
  chat.innerHTML="";
  snap.forEach(docSnap=>{
    const m=docSnap.data();

    const div=document.createElement("div");
    div.className="msg "+(m.user===user?"me":"other");

    const [c1,c2]=grad(m.user);

    div.innerHTML=`
      <div class="name" style="background:linear-gradient(45deg,${c1},${c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${m.user}
      </div>
      <div class="bubble">
        ${m.text}
        <div style="font-size:10px;opacity:.6;">
          ${new Date(m.time).toLocaleTimeString()}
        </div>
      </div>
    `;

    if(m.user===user){
      const status=document.createElement("div");
      status.style.fontSize="10px";
      status.innerText=(m.seenBy?.length>1)?"Seen":"Delivered";
      div.appendChild(status);
    }

    chat.appendChild(div);

    /* mark seen */
    if(!m.seenBy?.includes(user)){
      updateDoc(doc(db,"rooms",room,"messages",docSnap.id),{
        seenBy:[...(m.seenBy||[]),user]
      });
    }
  });

  chat.scrollTop=chat.scrollHeight;
});

/* theme */
document.getElementById("theme").onclick=()=>{
  document.body.classList.toggle("light");
};

/* effects */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let mode="none";
effect.onchange=e=>mode=e.target.value;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(mode==="snow"){
    for(let i=0;i<40;i++){
      ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
    }
  }

  if(mode==="rain"){
    for(let i=0;i<60;i++){
      ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1,10);
    }
  }

  if(mode==="thunder"){
    if(Math.random()<0.02){
      ctx.fillStyle="white";
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
  }

  requestAnimationFrame(draw);
}
draw();

</script>
</body>
</html>
