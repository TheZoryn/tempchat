<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp Chat</title>

<style>
:root{
  --bg:#0f172a;
  --text:#e5e7eb;
  --box:#1e293b;
  --me:#6366f1;
}
body.light{
  --bg:#f3f4f6;
  --text:#111;
  --box:#ffffff;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
  pointer-events:none;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:var(--box);
  align-items:center;
}
#info{font-size:12px;opacity:.7}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{max-width:75%;}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}

.name{font-size:11px;font-weight:bold;}

.bubble{
  padding:10px;
  border-radius:14px;
  background:var(--box);
  word-break:break-word;
}
.me .bubble{
  background:var(--me);
  color:#fff;
}

.meta{
  font-size:10px;
  opacity:.6;
  margin-top:4px;
}

.inputBox{
  display:flex;
  padding:8px;
  gap:6px;
  background:var(--box);
}
input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* NEW: members panel */
#membersPanel{
  position:fixed;
  right:0;
  top:0;
  width:220px;
  height:100%;
  background:var(--box);
  border-left:1px solid #0003;
  padding:10px;
  display:none;
  overflow-y:auto;
}

.member{
  padding:6px;
  font-size:13px;
  border-bottom:1px solid #0002;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">
  <div id="info"></div>
  <div>
    <button id="copyLink">🔗</button>
    <button id="membersBtn">👥</button>
    <select id="effect">
      <option value="none">None</option>
      <option value="snow">Snow</option>
      <option value="rain">Rain</option>
      <option value="thunder">Thunder</option>
    </select>
    <button id="theme">🌙</button>
  </div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message...">
  <button id="sendBtn">Send</button>
</div>

<div id="membersPanel">
  <h3>Members</h3>
  <div id="membersList"></div>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,collection,addDoc,query,orderBy,onSnapshot,
doc,setDoc,updateDoc,deleteDoc,getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain:"temp-chat-6f08b.firebaseapp.com",
  projectId:"temp-chat-6f08b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const p=new URLSearchParams(location.search);
const user=p.get("user");
const room=p.get("room");

const chat=document.getElementById("chat");
const msgInput=document.getElementById("msg");
const info=document.getElementById("info");

const membersBtn=document.getElementById("membersBtn");
const membersPanel=document.getElementById("membersPanel");
const membersList=document.getElementById("membersList");

membersBtn.onclick=()=>{
  membersPanel.style.display=membersPanel.style.display==="none"?"block":"none";
};

// COPY LINK
document.getElementById("copyLink").onclick=()=>{
  navigator.clipboard.writeText(location.href);
  alert("Link copied!");
};

// ADMIN SYSTEM
const metaRef=doc(db,"rooms",room,"meta","data");
const metaSnap=await getDoc(metaRef);

if(!metaSnap.exists()){
  await setDoc(metaRef,{admin:user});
}

const admin=(await getDoc(metaRef)).data().admin;

function grad(name){
  const g=[["#ff7eb3","#ff758c"],["#7afcff","#00c6ff"],["#fbc2eb","#a6c1ee"],["#fddb92","#d1fdff"],["#84fab0","#8fd3f4"]];
  return g[name.length%g.length];
}

const presRef=doc(db,"rooms",room,"presence",user);
await setDoc(presRef,{online:true});
window.addEventListener("beforeunload",()=>deleteDoc(presRef));

onSnapshot(collection(db,"rooms",room,"presence"),snap=>{
  let users=[];
  membersList.innerHTML="";
  snap.forEach(d=>{
    users.push(d.id);
    const div=document.createElement("div");
    div.className="member";
    div.innerText=d.id + (d.id===admin?" 👑":"");
    membersList.appendChild(div);
  });
  info.innerText=`${room} • ${users.length} online`;
});

const messagesRef=collection(db,"rooms",room,"messages");

async function send(){
  const text=msgInput.value.trim();
  if(!text)return;

  await addDoc(messagesRef,{
    user,
    text,
    time:Date.now(),
    seenBy:[user]
  });

  msgInput.value="";
}

document.getElementById("sendBtn").onclick=send;
msgInput.addEventListener("keypress",e=>{if(e.key==="Enter")send();});

onSnapshot(query(messagesRef,orderBy("time")),snap=>{
  chat.innerHTML="";

  snap.forEach(docSnap=>{
    const m=docSnap.data();
    const div=document.createElement("div");
    div.className="msg "+(m.user===user?"me":"other");

    const [c1,c2]=grad(m.user);

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.textContent=m.text;

    const name=document.createElement("div");
    name.className="name";
    name.style.background=`linear-gradient(45deg,${c1},${c2})`;
    name.style.webkitBackgroundClip="text";
    name.style.webkitTextFillColor="transparent";
    name.innerText=m.user + (m.user===admin?" 👑":"");

    const time=document.createElement("div");
    time.className="meta";
    time.innerText=new Date(m.time).toLocaleTimeString();

    bubble.appendChild(time);
    div.appendChild(name);
    div.appendChild(bubble);

    // DELETE BUTTON
    if(m.user===user || user===admin){
      const del=document.createElement("button");
      del.innerText="❌";
      del.onclick=()=>deleteDoc(doc(db,"rooms",room,"messages",docSnap.id));
      div.appendChild(del);
    }

    chat.appendChild(div);

    if(!m.seenBy?.includes(user)){
      updateDoc(doc(db,"rooms",room,"messages",docSnap.id),{
        seenBy:[...(m.seenBy||[]),user]
      });
    }
  });

  chat.scrollTop=chat.scrollHeight;
});

// THEME
document.getElementById("theme").onclick=()=>{
  document.body.classList.toggle("light");
};

// EFFECTS
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();window.onresize=resize;

let mode="none";
document.getElementById("effect").onchange=e=>mode=e.target.value;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(mode==="snow"){
    for(let i=0;i<40;i++) ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
  }
  if(mode==="rain"){
    for(let i=0;i<60;i++) ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1,10);
  }
  if(mode==="thunder"){
    if(Math.random()<0.02){ctx.fillStyle="white";ctx.fillRect(0,0,canvas.width,canvas.height);} }

  requestAnimationFrame(draw);
}
draw();

</script>
</body>
</html>
