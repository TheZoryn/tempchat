<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp Chat</title>

<style>
:root{--bg:#0f172a;--text:#e5e7eb;--box:#1e293b;--me:#6366f1}
body.light{--bg:#f3f4f6;--text:#111;--box:#fff}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}
canvas{position:fixed;inset:0;z-index:-1;pointer-events:none}

.header{display:flex;justify-content:space-between;padding:10px;background:var(--box);align-items:center;position:relative;z-index:5}
#info{font-size:12px;opacity:.7}

#chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:75%;position:relative}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}
.name{font-size:11px;font-weight:bold}
.bubble{padding:10px;border-radius:14px;background:var(--box);word-break:break-word}
.me .bubble{background:var(--me);color:#fff}
.meta{font-size:10px;opacity:.6;margin-top:4px}

/* hover delete */
.deleteBtn{position:absolute;top:0;right:-18px;opacity:0;transition:.2s;cursor:pointer;font-size:12px}
.msg:hover .deleteBtn{opacity:1}

/* reactions */
.reactions{display:flex;gap:6px;margin-top:4px;font-size:12px}
.reactBtn{cursor:pointer;opacity:.7}
.reactBtn:hover{opacity:1}

.inputBox{display:flex;padding:8px;gap:6px;background:var(--box)}
input{flex:1;padding:12px;border-radius:20px;border:none;outline:none}
button{padding:10px 14px;border:none;border-radius:20px;cursor:pointer}

/* MEMBERS PANEL (fixed overlay, not cutting chat) */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.25s;z-index:8}
#overlay.active{opacity:1;pointer-events:auto}

#membersPanel{position:fixed;top:0;right:0;height:100%;width:280px;max-width:85vw;background:var(--box);transform:translateX(100%);transition:.25s;z-index:9;display:flex;flex-direction:column}
#membersPanel.active{transform:translateX(0)}

.membersHeader{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #0003}
#membersList{flex:1;overflow:auto;padding:10px}
.member{padding:10px;border-radius:10px;margin-bottom:8px;background:#0002}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="header">
  <div id="info"></div>
  <div>
    <button id="copyLink">🔗</button>
    <button id="membersBtn">👥</button>
    <select id="effect">
      <option value="none">None</option>
      <option value="snow">Snow</option>
      <option value="rain">Rain</option>
      <option value="thunder">Thunder</option>
    </select>
    <button id="theme">🌙</button>
  </div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message...">
  <button id="sendBtn">Send</button>
</div>

<div id="overlay"></div>
<div id="membersPanel">
  <div class="membersHeader">
    <strong>Members</strong>
    <button id="closeMembers">✖</button>
  </div>
  <div id="membersList"></div>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {getFirestore,collection,addDoc,query,orderBy,onSnapshot,doc,setDoc,updateDoc,deleteDoc} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",authDomain:"temp-chat-6f08b.firebaseapp.com",projectId:"temp-chat-6f08b"});
const db=getFirestore(app);

const p=new URLSearchParams(location.search);
const user=p.get("user");
const room=p.get("room");

const chat=document.getElementById("chat");
const msgInput=document.getElementById("msg");
const info=document.getElementById("info");

// members UI
const panel=document.getElementById("membersPanel");
const overlay=document.getElementById("overlay");
document.getElementById("membersBtn").onclick=()=>{panel.classList.add("active");overlay.classList.add("active")};
document.getElementById("closeMembers").onclick=closePanel;
overlay.onclick=closePanel;
function closePanel(){panel.classList.remove("active");overlay.classList.remove("active")}

// copy link
document.getElementById("copyLink").onclick=()=>{navigator.clipboard.writeText(location.href)};

function grad(n){const g=[["#ff7eb3","#ff758c"],["#7afcff","#00c6ff"],["#fbc2eb","#a6c1ee"],["#fddb92","#d1fdff"],["#84fab0","#8fd3f4"]];return g[n.length%g.length]}

// presence
const presRef=doc(db,"rooms",room,"presence",user);
await setDoc(presRef,{online:true});
window.addEventListener("beforeunload",()=>deleteDoc(presRef));

onSnapshot(collection(db,"rooms",room,"presence"),snap=>{
  let users=[];membersList.innerHTML="";
  snap.forEach(d=>{users.push(d.id);const el=document.createElement("div");el.className="member";el.innerText=d.id;membersList.appendChild(el)});
  info.innerText=`${room} • ${users.length} online`;
});

// messages
const messagesRef=collection(db,"rooms",room,"messages");

async function send(){const text=msgInput.value.trim();if(!text)return;await addDoc(messagesRef,{user,text,time:Date.now(),seenBy:[user],reactions:{}});msgInput.value=""}

document.getElementById("sendBtn").onclick=send;
msgInput.addEventListener("keypress",e=>{if(e.key==="Enter")send()});

function toggleReaction(id,data,emoji){
  const r=data.reactions||{};
  const arr=r[emoji]||[];
  const updated=arr.includes(user)?arr.filter(u=>u!==user):[...arr,user];
  updateDoc(doc(db,"rooms",room,"messages",id),{[`reactions.${emoji}`]:updated});
}

onSnapshot(query(messagesRef,orderBy("time")),snap=>{
  chat.innerHTML="";

  snap.forEach(docSnap=>{
    const m=docSnap.data();
    const div=document.createElement("div");
    div.className="msg "+(m.user===user?"me":"other");

    const [c1,c2]=grad(m.user);

    const name=document.createElement("div");
    name.className="name";
    name.style.background=`linear-gradient(45deg,${c1},${c2})`;
    name.style.webkitBackgroundClip="text";
    name.style.webkitTextFillColor="transparent";
    name.innerText=m.user;

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.textContent=m.text;

    const time=document.createElement("div");
    time.className="meta";
    time.innerText=new Date(m.time).toLocaleTimeString();

    // reactions UI
    const reacts=document.createElement("div");
    reacts.className="reactions";
    ["👍","❤️","🔥"].forEach(e=>{
      const btn=document.createElement("span");
      const count=(m.reactions?.[e]||[]).length;
      btn.innerText=e+(count?` ${count}`:"");
      btn.className="reactBtn";
      btn.onclick=()=>toggleReaction(docSnap.id,m,e);
      reacts.appendChild(btn);
    });

    bubble.appendChild(time);
    bubble.appendChild(reacts);

    div.appendChild(name);
    div.appendChild(bubble);

    // delete own
    if(m.user===user){
      const del=document.createElement("div");
      del.className="deleteBtn";
      del.innerText="🗑";
      del.onclick=()=>deleteDoc(doc(db,"rooms",room,"messages",docSnap.id));
      div.appendChild(del);
    }

    chat.appendChild(div);

    if(!m.seenBy?.includes(user)){
      updateDoc(doc(db,"rooms",room,"messages",docSnap.id),{seenBy:[...(m.seenBy||[]),user]});
    }
  });

  chat.scrollTop=chat.scrollHeight;
});

// theme
document.getElementById("theme").onclick=()=>document.body.classList.toggle("light");

// effects
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}resize();window.onresize=resize;
let mode="none";
document.getElementById("effect").onchange=e=>mode=e.target.value;
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);
if(mode==="snow")for(let i=0;i<40;i++)ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
if(mode==="rain")for(let i=0;i<60;i++)ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1,10);
if(mode==="thunder")if(Math.random()<0.02){ctx.fillStyle="white";ctx.fillRect(0,0,canvas.width,canvas.height)}
requestAnimationFrame(draw)}draw();

</script>
</body>
</html>
