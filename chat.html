<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibely Chat</title>
<style>
:root{
  --bg:#0f172a;
  --text:#e5e7eb;
  --box:#1e293b;
  --me:#6366f1;
  --border:rgba(255,255,255,.08);
  --muted:rgba(229,231,235,.7);
}
body.light{
  --bg:#f3f4f6;
  --text:#111827;
  --box:#ffffff;
  --border:rgba(15,23,42,.08);
  --muted:rgba(17,24,39,.65);
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#side{
  width:240px;
  border-right:1px solid var(--border);
  padding:10px;
  overflow:auto;
}
#chatWrap{flex:1;display:flex;flex-direction:column}

.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid var(--border);
}
#info{font-size:12px;font-weight:700}
#coins{font-size:12px;opacity:.8}

#chat{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}

.msg{max-width:75%}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}

.bubble{
  padding:10px;
  border-radius:14px;
  background:var(--box);
  border:1px solid var(--border);
}
.me .bubble{background:var(--me);color:white}

.meta{font-size:10px;opacity:.7;margin-top:4px}

.actions{display:flex;gap:6px;margin-top:4px}
.btnSmall{font-size:10px;padding:4px 6px;border:none;border-radius:8px;cursor:pointer}

.inputBox{display:flex;gap:6px;padding:10px;border-top:1px solid var(--border)}
input{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--box);color:var(--text)}
button{border:none;border-radius:12px;padding:10px;cursor:pointer}
#sendBtn{background:var(--me);color:white}

/* emoji bar */
#emojiBar{display:flex;gap:6px;padding:6px 10px;border-top:1px solid var(--border)}
.emoji{cursor:pointer}

/* members */
.member{font-size:12px;padding:6px;border-bottom:1px solid var(--border)}

</style>
</head>
<body>

<div id="side">
  <b>Members</b>
  <div id="members"></div>
</div>

<div id="chatWrap">

  <div class="header">
    <div>
      <div id="info">room</div>
      <div id="coins">coins: 0</div>
    </div>
    <button id="themeBtn">🌙</button>
  </div>

  <div id="chat"></div>

  <div id="emojiBar">
    <span class="emoji">😀</span>
    <span class="emoji">😂</span>
    <span class="emoji">🔥</span>
    <span class="emoji">👍</span>
  </div>

  <div class="inputBox">
    <input id="msg" placeholder="Type message..." />
    <button id="sendBtn">Send</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain:"temp-chat-6f08b.firebaseapp.com",
  projectId:"temp-chat-6f08b"
});

const db = getFirestore(app);

const p = new URLSearchParams(location.search);
const room = p.get("room") || "global";
const user = p.get("user") || "guest";

const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const members = document.getElementById("members");
const coinsUI = document.getElementById("coins");

let coins = Number(localStorage.getItem("coins") || 0);
coinsUI.innerText = "coins: " + coins;

function addCoins(v){
  coins += v;
  localStorage.setItem("coins", coins);
  coinsUI.innerText = "coins: " + coins;
}

/* presence */
const presRef = doc(db,"rooms",room,"presence",user);
setDoc(presRef,{t:Date.now()});
setInterval(()=>setDoc(presRef,{t:Date.now()}),4000);
window.addEventListener("beforeunload",()=>deleteDoc(presRef));

onSnapshot(collection(db,"rooms",room,"presence"),snap=>{
  members.innerHTML="";
  snap.forEach(d=>{
    const div=document.createElement("div");
    div.className="member";
    div.innerText=d.id;
    members.appendChild(div);
  });
});

/* send */
const ref = collection(db,"rooms",room,"messages");

async function send(){
  const text = msg.value.trim();
  if(!text) return;
  msg.value="";

  await addDoc(ref,{user,text,time:Date.now(),likes:[]});
  addCoins(1);
}

sendBtn.onclick=send;

/* emoji insert */
document.querySelectorAll(".emoji").forEach(e=>{
  e.onclick=()=>msg.value += e.textContent;
});

/* messages */
onSnapshot(query(ref,orderBy("time")),snap=>{
  chat.innerHTML="";

  snap.forEach(d=>{
    const m=d.data();
    const div=document.createElement("div");
    div.className="msg"+(m.user===user?" me":" other");

    div.innerHTML=`
      <div class="bubble">
        <b>${m.user}</b><br>
        ${m.text}
        <div class="meta">${new Date(m.time).toLocaleTimeString()}</div>

        <div class="actions">
          <button class="btnSmall">🔥 ${m.likes?.length||0}</button>
          ${m.user===user?"<button class='btnSmall del'>🗑</button>":""}
        </div>
      </div>
    `;

    div.querySelector(".del")?.addEventListener("click",()=>{
      deleteDoc(doc(db,"rooms",room,"messages",d.id));
    });

    div.querySelector("button")?.addEventListener("click",()=>{
      const arr = m.likes || [];
      if(!arr.includes(user)) arr.push(user);
      setDoc(doc(db,"rooms",room,"messages",d.id),{likes:arr},{merge:true});
    });

    chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
});

</script>

</body>
</html>
