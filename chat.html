<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibely Chat</title>

<style>
:root{
  --bg:#0f172a;
  --text:#e5e7eb;
  --box:#1e293b;
  --box2:#233047;
  --me:#6366f1;
  --border:rgba(255,255,255,.08);
  --muted:rgba(229,231,235,.7);
  --shadow:0 12px 40px rgba(0,0,0,.2);
  --accent:#7c3aed;
  --accent2:#22c55e;
}

body.light{
  --bg:#f3f4f6;
  --text:#111827;
  --box:#ffffff;
  --box2:#f9fafb;
  --border:rgba(15,23,42,.08);
  --muted:rgba(17,24,39,.65);
  --shadow:0 12px 40px rgba(15,23,42,.08);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  background:rgba(0,0,0,.04);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);
  z-index:20;
}

.headerLeft{
  min-width:0;
  flex:1;
}

#info{
  font-size:12px;
  opacity:.95;
  line-height:1.2;
  font-weight:700;
}

#typing{
  margin-top:2px;
  font-size:12px;
  color:var(--muted);
  height:16px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.headerRight{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  flex-wrap:wrap;
  justify-content:flex-end;
}

button,select,input{
  border:none;
  outline:none;
  border-radius:14px;
}

button,select{
  background:var(--box);
  color:var(--text);
  box-shadow:var(--shadow);
}

button{
  cursor:pointer;
  padding:10px 12px;
}

select{
  padding:10px 12px;
}

button:hover,select:hover{filter:brightness(1.05)}

#coinsDisplay{
  display:flex;
  align-items:center;
  gap:6px;
  padding:9px 12px;
  border-radius:14px;
  background:linear-gradient(135deg, rgba(124,58,237,.18), rgba(34,197,94,.14));
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  font-weight:800;
  font-size:13px;
  white-space:nowrap;
}
#coinsDisplay span{font-size:14px}

#chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  scroll-behavior:smooth;
}

.msg{
  max-width:min(78%, 560px);
  position:relative;
  display:flex;
  flex-direction:column;
  gap:4px;
  animation:pop .15s ease-out;
}

@keyframes pop{
  from{transform:translateY(6px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

.me{align-self:flex-end;align-items:flex-end;text-align:right}
.other{align-self:flex-start;align-items:flex-start}

.name{
  font-size:11px;
  font-weight:800;
  letter-spacing:.02em;
  line-height:1;
}

.bubble{
  position:relative;
  padding:10px 12px 8px;
  border-radius:16px;
  background:var(--box);
  border:1px solid var(--border);
  word-break:break-word;
  box-shadow:var(--shadow);
  min-width:110px;
}

.me .bubble{
  background:linear-gradient(135deg, var(--me), #4f46e5);
  color:#fff;
  border-color:transparent;
}

.text{
  font-size:14px;
  line-height:1.45;
  white-space:pre-wrap;
}

.meta{
  margin-top:6px;
  font-size:10px;
  opacity:.7;
}

.reactions{
  display:flex;
  gap:6px;
  margin-top:8px;
  flex-wrap:wrap;
}

.reactBtn{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:11px;
  padding:6px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  user-select:none;
}

.other .reactBtn{
  background:rgba(0,0,0,.04);
  border-color:var(--border);
}

.reactBtn.active{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.deleteBtn{
  position:absolute;
  top:4px;
  right:-18px;
  opacity:0;
  transform:scale(.95);
  transition:.15s ease;
  cursor:pointer;
  font-size:12px;
  background:transparent;
  box-shadow:none;
  padding:0;
}

.msg:hover .deleteBtn,
.msg:focus-within .deleteBtn{opacity:1}

.inputBox{
  display:flex;
  gap:8px;
  padding:10px;
  background:rgba(0,0,0,.04);
  border-top:1px solid var(--border);
  backdrop-filter:blur(12px);
}

#msg{
  flex:1;
  padding:13px 16px;
  border-radius:18px;
  border:1px solid var(--border);
  outline:none;
  background:var(--box);
  color:var(--text);
  box-shadow:var(--shadow);
  font:inherit;
}

#msg::placeholder{color:var(--muted)}

#sendBtn{
  min-width:74px;
  background:linear-gradient(135deg, var(--me), #4f46e5);
  color:#fff;
  font-weight:700;
}

#emojiBtn{padding:10px 11px}

/* overlays */
#overlay,
#emojiOverlay{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.45);
  opacity:0;
  pointer-events:none;
  transition:.2s ease;
  z-index:30;
}
#overlay.active,
#emojiOverlay.active{
  opacity:1;
  pointer-events:auto;
}

/* panels */
#membersPanel,
#shopPanel,
#emojiPanel{
  position:fixed;
  top:0;
  right:0;
  width:min(340px, 90vw);
  height:100%;
  background:var(--box);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:.22s ease;
  z-index:35;
  display:flex;
  flex-direction:column;
  box-shadow:-16px 0 40px rgba(0,0,0,.18);
}
#membersPanel.active,
#shopPanel.active,
#emojiPanel.active{transform:translateX(0)}

.panelTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid var(--border);
}

.panelTop strong{font-size:15px}

.panelSub{
  padding:0 14px 12px;
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

#membersList,
#shopList,
#emojiList{
  padding:10px 10px 14px;
  overflow:auto;
  flex:1;
}

.member,
.shopItem,
.emojiItem{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  background:var(--box2);
  border:1px solid var(--border);
  margin-bottom:8px;
}

.memberLeft,
.shopLeft,
.emojiLeft{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 0 4px rgba(34,197,94,.12);
  flex-shrink:0;
}

.memberName,
.shopTitle,
.emojiText{
  font-size:14px;
  font-weight:700;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.badge,
.priceTag{
  font-size:10px;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(124,58,237,.14);
  color:#a78bfa;
  border:1px solid rgba(124,58,237,.18);
  flex-shrink:0;
  white-space:nowrap;
}

.shopMeta,
.emojiMeta{
  font-size:11px;
  color:var(--muted);
  margin-top:3px;
  line-height:1.35;
}

.buyBtn,
.useBtn{
  padding:8px 10px;
  border-radius:12px;
  background:linear-gradient(135deg, var(--me), #4f46e5);
  color:#fff;
  font-size:12px;
  font-weight:800;
  flex-shrink:0;
}

.buyBtn:disabled,
.useBtn:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.emptyState{
  padding:18px 12px;
  color:var(--muted);
  font-size:13px;
  text-align:center;
}

/* theme unlock styles */
body.theme-glow{--me:#d946ef}
body.theme-fire{--me:#f97316}
body.theme-ocean{--me:#06b6d4}
body.theme-mint{--me:#22c55e}
body.theme-gold{--me:#eab308}

.msg.bubble-soft .bubble{border-radius:20px}
.msg.bubble-pill .bubble{border-radius:999px}
.msg.bubble-neon .bubble{border:1px solid rgba(167,139,250,.4);box-shadow:0 0 0 1px rgba(167,139,250,.12), 0 0 22px rgba(124,58,237,.18)}
.msg.bubble-glass .bubble{background:rgba(255,255,255,.08);backdrop-filter:blur(10px)}
body.light .msg.bubble-glass .bubble{background:rgba(255,255,255,.72)}

@media (max-width:560px){
  .header{padding:10px}
  .headerRight{gap:6px}
  button,select{padding:9px 10px}
  .msg{max-width:88%}
  #sendBtn{min-width:66px}
  #membersPanel,#shopPanel,#emojiPanel{width:min(330px, 92vw)}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="header">
  <div class="headerLeft">
    <div id="info">Loading...</div>
    <div id="typing"></div>
  </div>
  <div class="headerRight">
    <div id="coinsDisplay" title="Your coins"><span>🪙</span><span id="coinsCount">0</span></div>
    <button id="shopBtn" title="Shop">🛍</button>
    <button id="emojiBtn" title="Emoji">😊</button>
    <button id="copyLink" title="Copy room link">🔗</button>
    <button id="membersBtn" title="Members">👥</button>
    <select id="effect" aria-label="Background effect">
      <option value="none">None</option>
      <option value="snow">Snow</option>
      <option value="rain">Rain</option>
      <option value="thunder">Thunder</option>
    </select>
    <button id="theme" title="Toggle theme">🌙</button>
  </div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message..." autocomplete="off" />
  <button id="sendBtn">Send</button>
</div>

<div id="overlay"></div>
<div id="emojiOverlay"></div>

<div id="membersPanel" aria-hidden="true">
  <div class="panelTop">
    <strong>Members</strong>
    <button id="closeMembers" title="Close">✖</button>
  </div>
  <div class="panelSub" id="membersSub">People active in this room right now.</div>
  <div id="membersList"></div>
</div>

<div id="shopPanel" aria-hidden="true">
  <div class="panelTop">
    <strong>Shop</strong>
    <button id="closeShop" title="Close">✖</button>
  </div>
  <div class="panelSub" id="shopCoinsInfo">Buy cosmetics with coins. Coins follow your username across rooms.</div>
  <div id="shopList"></div>
</div>

<div id="emojiPanel" aria-hidden="true">
  <div class="panelTop">
    <strong>Emoji</strong>
    <button id="closeEmoji" title="Close">✖</button>
  </div>
  <div class="panelSub">Tap an emoji to insert it into your message.</div>
  <div id="emojiList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  doc,
  setDoc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain: "temp-chat-6f08b.firebaseapp.com",
  projectId: "temp-chat-6f08b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const p = new URLSearchParams(location.search);
const room = p.get("room") || "room";
let user = p.get("user") || localStorage.getItem("vibely-username") || "";
if (!user) {
  user = prompt("Choose your username")?.trim() || "Guest";
}
localStorage.setItem("vibely-username", user);

const chat = document.getElementById("chat");
const msgInput = document.getElementById("msg");
const info = document.getElementById("info");
const typingUI = document.getElementById("typing");
const coinsCount = document.getElementById("coinsCount");
const membersList = document.getElementById("membersList");
const membersSub = document.getElementById("membersSub");
const shopList = document.getElementById("shopList");
const shopCoinsInfo = document.getElementById("shopCoinsInfo");
const emojiList = document.getElementById("emojiList");
const overlay = document.getElementById("overlay");
const emojiOverlay = document.getElementById("emojiOverlay");
const membersPanel = document.getElementById("membersPanel");
const shopPanel = document.getElementById("shopPanel");
const emojiPanel = document.getElementById("emojiPanel");
const themeBtn = document.getElementById("theme");
const effectSel = document.getElementById("effect");

const state = {
  coins: 0,
  prefs: {
    bubble: "soft",
    nameGlow: "none",
    themeClass: "",
    effect: "none"
  },
  ui: {
    memberOpen: false,
    shopOpen: false,
    emojiOpen: false
  },
  typingTimer: null,
  isTyping: false,
  selectedEmoji: ""
};

const userKey = user.toLowerCase().replace(/[^a-z0-9]+/g, "_") || "guest";
const storageCoinsKey = `vibely-coins-${userKey}`;
const storagePrefsKey = `vibely-prefs-${userKey}`;
const storageBonusKey = `vibely-bonus-${userKey}`;
const storageUnlockKey = `vibely-unlocks-${userKey}`;
const storageHistoryKey = `vibely-history-${userKey}`;

const DEFAULT_UNLOCKS = {
  "bubble-soft": true
};

const SHOP_ITEMS = [
  { id: "bubble-soft", title: "Soft Bubbles", price: 0, desc: "Cleaner rounded chat bubbles." },
  { id: "bubble-pill", title: "Pill Bubbles", price: 25, desc: "Big smooth bubble style." },
  { id: "bubble-neon", title: "Neon Bubbles", price: 45, desc: "A glowing chat look." },
  { id: "bubble-glass", title: "Glass Bubbles", price: 60, desc: "Soft transparent feel." },
  { id: "theme-glow", title: "Glow Theme", price: 40, desc: "Pink-violet send color." },
  { id: "theme-fire", title: "Fire Theme", price: 50, desc: "Warm fire-orange send color." },
  { id: "theme-ocean", title: "Ocean Theme", price: 50, desc: "Fresh cyan send color." },
  { id: "theme-mint", title: "Mint Theme", price: 50, desc: "Green fresh send color." },
  { id: "theme-gold", title: "Gold Theme", price: 65, desc: "Premium gold send color." },
  { id: "name-rainbow", title: "Rainbow Name", price: 35, desc: "Your name gets a rainbow glow." },
  { id: "name-gold", title: "Gold Name", price: 55, desc: "Premium gold name style." },
  { id: "effect-rain", title: "Rain Effect", price: 15, desc: "Unlock rainy background." },
  { id: "effect-snow", title: "Snow Effect", price: 15, desc: "Unlock snowy background." },
  { id: "effect-thunder", title: "Thunder Effect", price: 20, desc: "Unlock thunder flash background." }
];

const EMOJIS = ["😂","🔥","❤️","👍","😭","😎","😳","💯","✨","🤝","💀","😍"];

function grad(name){
  const g = [
    ["#ff7eb3", "#ff758c"],
    ["#7afcff", "#00c6ff"],
    ["#fbc2eb", "#a6c1ee"],
    ["#fddb92", "#d1fdff"],
    ["#84fab0", "#8fd3f4"]
  ];
  return g[name.length % g.length];
}

function esc(v){ return String(v ?? ""); }

function saveHistory(entry){
  const history = JSON.parse(localStorage.getItem(storageHistoryKey) || "[]");
  history.unshift({ time: Date.now(), ...entry });
  localStorage.setItem(storageHistoryKey, JSON.stringify(history.slice(0, 100)));
}

function loadPrefs(){
  try {
    const raw = localStorage.getItem(storagePrefsKey);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") {
        state.prefs = { ...state.prefs, ...parsed };
      }
    }
  } catch {}
}

function savePrefs(){
  localStorage.setItem(storagePrefsKey, JSON.stringify(state.prefs));
}

function setCoinBalance(v){
  state.coins = Math.max(0, Math.floor(Number(v) || 0));
  coinsCount.textContent = String(state.coins);
  localStorage.setItem(storageCoinsKey, String(state.coins));
}

function addCoins(amount, reason="activity"){
  if (!amount) return;
  setCoinBalance(state.coins + amount);
  saveHistory({ type:"coins", amount, reason, room });
}

function getUnlocks(){
  try {
    return JSON.parse(localStorage.getItem(storageUnlockKey) || "{}");
  } catch {
    return {};
  }
}
function saveUnlocks(unlocks){
  localStorage.setItem(storageUnlockKey, JSON.stringify(unlocks));
}
function isUnlocked(itemId){
  const unlocks = getUnlocks();
  return !!(unlocks[itemId] || DEFAULT_UNLOCKS[itemId]);
}
function unlock(itemId){
  const unlocks = getUnlocks();
  unlocks[itemId] = true;
  saveUnlocks(unlocks);
}

function openPanel(which){
  closePanels();
  if (which === "members") {
    membersPanel.classList.add("active");
    membersPanel.setAttribute("aria-hidden", "false");
    state.ui.memberOpen = true;
  }
  if (which === "shop") {
    shopPanel.classList.add("active");
    shopPanel.setAttribute("aria-hidden", "false");
    state.ui.shopOpen = true;
  }
  if (which === "emoji") {
    emojiPanel.classList.add("active");
    emojiPanel.setAttribute("aria-hidden", "false");
    state.ui.emojiOpen = true;
  }
  overlay.classList.add("active");
  emojiOverlay.classList.add("active");
}

function closePanels(){
  membersPanel.classList.remove("active");
  shopPanel.classList.remove("active");
  emojiPanel.classList.remove("active");
  membersPanel.setAttribute("aria-hidden", "true");
  shopPanel.setAttribute("aria-hidden", "true");
  emojiPanel.setAttribute("aria-hidden", "true");
  overlay.classList.remove("active");
  emojiOverlay.classList.remove("active");
  state.ui.memberOpen = false;
  state.ui.shopOpen = false;
  state.ui.emojiOpen = false;
}

function refreshOverlay(){
  if (state.ui.memberOpen || state.ui.shopOpen || state.ui.emojiOpen) {
    overlay.classList.add("active");
    emojiOverlay.classList.add("active");
  } else {
    overlay.classList.remove("active");
    emojiOverlay.classList.remove("active");
  }
}

function getPreferredTheme(){
  const saved = localStorage.getItem("theme");
  if (saved === "light" || saved === "dark") return saved;
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}
function applyTheme(theme){
  document.body.classList.toggle("light", theme === "light");
  themeBtn.textContent = theme === "light" ? "☀" : "🌙";
  document.documentElement.style.colorScheme = theme;
  localStorage.setItem("theme", theme);
}

function applyPrefs(){
  document.body.classList.remove("theme-glow","theme-fire","theme-ocean","theme-mint","theme-gold");
  if (state.prefs.themeClass) document.body.classList.add(state.prefs.themeClass);

  document.querySelectorAll(".msg").forEach(node => {
    node.classList.remove("bubble-soft","bubble-pill","bubble-neon","bubble-glass");
    node.classList.add(`bubble-${state.prefs.bubble}`);
  });

  effectSel.value = state.prefs.effect || "none";
  mode = effectSel.value;
}

function renderName(name){
  const safe = esc(name || "Unknown");
  if (state.prefs.nameGlow === "rainbow") return `<span style="background:linear-gradient(90deg,#ff4d6d,#ffbd59,#7bffb2,#5ed3ff,#c77dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">${safe}</span>`;
  if (state.prefs.nameGlow === "gold") return `<span style="background:linear-gradient(90deg,#fbbf24,#fde68a,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">${safe}</span>`;
  const [c1,c2] = grad(name || "");
  return `<span style="background:linear-gradient(45deg,${c1},${c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">${safe}</span>`;
}

function renderMembers(activeMembers){
  membersList.innerHTML = "";
  if (!activeMembers.length) {
    membersList.innerHTML = '<div class="emptyState">No one active right now.</div>';
    return;
  }
  activeMembers.forEach(m => {
    const row = document.createElement("div");
    row.className = "member";
    row.innerHTML = `
      <div class="memberLeft">
        <div class="dot"></div>
        <div class="memberName"></div>
      </div>
      <div class="badge">Active</div>
    `;
    row.querySelector(".memberName").innerHTML = renderName(m.id);
    membersList.appendChild(row);
  });
}

function shopMarkup(item){
  const owned = isUnlocked(item.id);
  const active = (
    (item.id.startsWith("bubble-") && state.prefs.bubble === item.id.replace("bubble-", "")) ||
    (item.id.startsWith("theme-") && state.prefs.themeClass === item.id) ||
    (item.id.startsWith("effect-") && state.prefs.effect === item.id.replace("effect-", "")) ||
    (item.id === "name-rainbow" && state.prefs.nameGlow === "rainbow") ||
    (item.id === "name-gold" && state.prefs.nameGlow === "gold")
  );
  const actionText = active ? "Equipped" : owned ? "Use" : `Buy ${item.price}`;

  return `
    <div class="shopItem">
      <div class="shopLeft">
        <div class="dot" style="background:${owned ? '#22c55e' : '#a78bfa'};box-shadow:${owned ? '0 0 0 4px rgba(34,197,94,.12)' : '0 0 0 4px rgba(167,139,250,.12)'}"></div>
        <div style="min-width:0">
          <div class="shopTitle">${item.title}</div>
          <div class="shopMeta">${item.desc}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <div class="priceTag">🪙 ${item.price}</div>
        <button class="buyBtn" data-shop="${item.id}">${actionText}</button>
      </div>
    </div>
  `;
}

function renderShop(){
  shopCoinsInfo.textContent = `Coins: ${state.coins}. Coins follow your username across rooms.`;
  shopList.innerHTML = SHOP_ITEMS.map(shopMarkup).join("");
  shopList.querySelectorAll("[data-shop]").forEach(btn => {
    btn.onclick = () => {
      const item = SHOP_ITEMS.find(x => x.id === btn.dataset.shop);
      if (!item) return;
      buyItem(item);
    };
  });
}

function renderEmoji(){
  emojiList.innerHTML = EMOJIS.map(emo => `
    <div class="emojiItem">
      <div class="emojiLeft">
        <div class="emojiText">${emo}</div>
        <div>
          <div class="shopTitle">${emo}</div>
          <div class="emojiMeta">Insert into your message</div>
        </div>
      </div>
      <button class="useBtn" data-emo="${emo}">Use</button>
    </div>
  `).join("");
  emojiList.querySelectorAll("[data-emo]").forEach(btn => {
    btn.onclick = () => {
      msgInput.value += btn.dataset.emo;
      msgInput.focus();
      closePanels();
    };
  });
}

function buyItem(item){
  const owned = isUnlocked(item.id);
  if (owned) {
    unlock(item.id);
    activateItem(item.id);
    saveHistory({ type:"use", item:item.id, room });
    renderShop();
    renderMessagesFromDom();
    return;
  }
  if (state.coins < item.price) {
    alert(`Need ${item.price} coins.`);
    return;
  }
  setCoinBalance(state.coins - item.price);
  unlock(item.id);
  activateItem(item.id);
  saveHistory({ type:"buy", item:item.id, price:item.price, room });
  renderShop();
  renderMessagesFromDom();
}

function activateItem(itemId){
  if (itemId.startsWith("bubble-")) state.prefs.bubble = itemId.replace("bubble-", "");
  if (itemId.startsWith("theme-")) state.prefs.themeClass = itemId;
  if (itemId.startsWith("effect-")) state.prefs.effect = itemId.replace("effect-", "");
  if (itemId === "name-rainbow") state.prefs.nameGlow = "rainbow";
  if (itemId === "name-gold") state.prefs.nameGlow = "gold";
  savePrefs();
  applyPrefs();
}

function renderMessagesFromDom(){
  document.querySelectorAll(".msg").forEach(node => {
    node.classList.remove("bubble-soft","bubble-pill","bubble-neon","bubble-glass");
    node.classList.add(`bubble-${state.prefs.bubble}`);
  });
}

/* top controls */
document.getElementById("membersBtn").onclick = () => { openPanel("members"); refreshOverlay(); };
document.getElementById("shopBtn").onclick = () => { renderShop(); openPanel("shop"); refreshOverlay(); };
document.getElementById("emojiBtn").onclick = () => { renderEmoji(); openPanel("emoji"); refreshOverlay(); };
document.getElementById("closeMembers").onclick = closePanels;
document.getElementById("closeShop").onclick = closePanels;
document.getElementById("closeEmoji").onclick = closePanels;
overlay.onclick = closePanels;
emojiOverlay.onclick = closePanels;

applyTheme(getPreferredTheme());

/* copy link */
document.getElementById("copyLink").onclick = async () => {
  try {
    await navigator.clipboard.writeText(location.href);
    const el = document.getElementById("copyLink");
    const prev = el.textContent;
    el.textContent = "✓";
    setTimeout(() => el.textContent = prev, 900);
  } catch {
    alert("Copy failed");
  }
};

/* load user data */
loadPrefs();
setCoinBalance(Number(localStorage.getItem(storageCoinsKey) || 0));
renderShop();
renderEmoji();
applyPrefs();

/* presence: active only */
const presRef = doc(db, "rooms", room, "presence", user);
let heartbeatTimer = null;
let visibilityTimer = null;

async function beat(){
  await setDoc(presRef, { user, lastSeen: Date.now(), room, active: true }, { merge: true });
}
await beat();
heartbeatTimer = setInterval(() => beat().catch(() => {}), 3000);
visibilityTimer = setInterval(() => {
  if (document.visibilityState === "visible") beat().catch(() => {});
}, 8000);

window.addEventListener("beforeunload", () => {
  clearInterval(heartbeatTimer);
  clearInterval(visibilityTimer);
  deleteDoc(presRef).catch(() => {});
  deleteDoc(doc(db, "rooms", room, "typing", user)).catch(() => {});
});

/* typing */
const typingRef = doc(db, "rooms", room, "typing", user);
async function setTyping(on){
  if (on) {
    state.isTyping = true;
    await setDoc(typingRef, { user, room, typing: true, lastSeen: Date.now() }, { merge: true });
  } else {
    state.isTyping = false;
    await deleteDoc(typingRef).catch(() => {});
  }
}
msgInput.addEventListener("input", () => {
  const value = msgInput.value.trim();
  if (!value) {
    clearTimeout(state.typingTimer);
    setTyping(false).catch(() => {});
    return;
  }
  clearTimeout(state.typingTimer);
  setTyping(true).catch(() => {});
  state.typingTimer = setTimeout(() => setTyping(false).catch(() => {}), 1500);
});

/* online members */
onSnapshot(collection(db, "rooms", room, "presence"), snap => {
  const now = Date.now();
  const active = [];
  const members = [];
  snap.forEach(d => {
    const data = d.data() || {};
    const lastSeen = Number(data.lastSeen || 0);
    const online = now - lastSeen < 7000;
    if (online) {
      active.push(d.id);
      members.push({ id: d.id, lastSeen });
    }
  });
  info.innerText = `${room} • ${active.length} online`;
  members.sort((a,b) => b.lastSeen - a.lastSeen);
  renderMembers(members);
  membersSub.textContent = `${active.length} people active in this room right now.`;
});

onSnapshot(collection(db, "rooms", room, "typing"), snap => {
  const others = [];
  const now = Date.now();
  snap.forEach(d => {
    if (d.id === user) return;
    const data = d.data() || {};
    const lastSeen = Number(data.lastSeen || 0);
    if (now - lastSeen < 2500) others.push(d.id);
  });
  if (!others.length) typingUI.textContent = "";
  else if (others.length === 1) typingUI.textContent = `${others[0]} is typing...`;
  else typingUI.textContent = `${others.length} people are typing...`;
});

/* messages + coins */
const messagesRef = collection(db, "rooms", room, "messages");

async function awardDailyBonus(){
  const dayKey = `${storageBonusKey}-${new Date().toDateString()}`;
  if (!localStorage.getItem(dayKey)) {
    setCoinBalance(state.coins + 5);
    saveHistory({ type:"daily_bonus", amount:5, room });
    localStorage.setItem(dayKey, "1");
  }
}
await awardDailyBonus();

function emojiBoost(text){
  const found = EMOJIS.filter(e => text.includes(e)).length;
  return found > 0 ? Math.min(1, found) : 0;
}

async function send(){
  const text = msgInput.value.trim();
  if (!text) return;

  const extra = emojiBoost(text);
  await addDoc(messagesRef, {
    user,
    text,
    time: Date.now(),
    seenBy: [user],
    reactions: {
      "👍": [],
      "❤️": [],
      "🔥": []
    }
  });

  addCoins(2 + extra, "message");
  msgInput.value = "";
  await setTyping(false).catch(() => {});
  msgInput.focus();
}

document.getElementById("sendBtn").onclick = send;
msgInput.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

function toggleReaction(messageId, data, emoji){
  const r = data.reactions || {};
  const arr = Array.isArray(r[emoji]) ? r[emoji] : [];
  const next = arr.includes(user) ? arr.filter(x => x !== user) : [...arr, user];
  updateDoc(doc(db, "rooms", room, "messages", messageId), { [`reactions.${emoji}`]: next });
  addCoins(1, "reaction");
}

function renderMessage(docSnap){
  const m = docSnap.data();
  const div = document.createElement("div");
  div.className = `msg ${m.user === user ? "me" : "other"}`;
  div.classList.add(`bubble-${state.prefs.bubble}`);

  const name = document.createElement("div");
  name.className = "name";
  name.innerHTML = renderName(m.user || "Unknown");

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  const text = document.createElement("div");
  text.className = "text";
  text.textContent = esc(m.text);

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = new Date(m.time || Date.now()).toLocaleTimeString();

  const reactions = document.createElement("div");
  reactions.className = "reactions";

  ["👍","❤️","🔥"].forEach(emoji => {
    const users = Array.isArray(m.reactions?.[emoji]) ? m.reactions[emoji] : [];
    const btn = document.createElement("span");
    btn.className = "reactBtn" + (users.includes(user) ? " active" : "");
    btn.textContent = `${emoji}${users.length ? ` ${users.length}` : ""}`;
    btn.onclick = () => toggleReaction(docSnap.id, m, emoji);
    reactions.appendChild(btn);
  });

  bubble.appendChild(text);
  bubble.appendChild(meta);
  bubble.appendChild(reactions);

  if (m.user === user) {
    const del = document.createElement("button");
    del.className = "deleteBtn";
    del.textContent = "🗑";
    del.title = "Delete message";
    del.onclick = () => deleteDoc(doc(db, "rooms", room, "messages", docSnap.id));
    div.appendChild(del);
  }

  div.appendChild(name);
  div.appendChild(bubble);
  return div;
}

function renderMessagesFromDom(){
  document.querySelectorAll(".msg").forEach(node => {
    node.classList.remove("bubble-soft","bubble-pill","bubble-neon","bubble-glass");
    node.classList.add(`bubble-${state.prefs.bubble}`);
  });
}

onSnapshot(query(messagesRef, orderBy("time")), snap => {
  const isAtBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 90;
  chat.innerHTML = "";
  snap.forEach(docSnap => chat.appendChild(renderMessage(docSnap)));
  if (isAtBottom) chat.scrollTop = chat.scrollHeight;
});

/* shop actions */
function buyItem(item){
  const owned = isUnlocked(item.id);
  if (owned) {
    activateItem(item.id);
    saveHistory({ type:"use", item:item.id, room });
    renderShop();
    renderMessagesFromDom();
    return;
  }
  if (state.coins < item.price) {
    alert(`Need ${item.price} coins.`);
    return;
  }
  setCoinBalance(state.coins - item.price);
  unlock(item.id);
  activateItem(item.id);
  saveHistory({ type:"buy", item:item.id, price:item.price, room });
  renderShop();
  renderMessagesFromDom();
}

/* effects */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let mode = effectSel.value || "none";

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

effectSel.onchange = e => {
  mode = e.target.value;
  state.prefs.effect = mode;
  savePrefs();
};

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const isLight = document.body.classList.contains("light");

  if(mode === "snow"){
    for(let i=0;i<40;i++){
      ctx.fillStyle = isLight ? "rgba(17,24,39,.18)" : "rgba(255,255,255,.28)";
      ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
    }
  }

  if(mode === "rain"){
    for(let i=0;i<60;i++){
      ctx.fillStyle = isLight ? "rgba(17,24,39,.2)" : "rgba(255,255,255,.22)";
      ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 10);
    }
  }

  if(mode === "thunder"){
    if(Math.random() < 0.02){
      ctx.fillStyle = "rgba(255,255,255,.15)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
  }

  requestAnimationFrame(draw);
}
draw();

/* init */
renderShop();
renderEmoji();
applyPrefs();
refreshOverlay();

/* hide = clear typing only */
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    deleteDoc(typingRef).catch(() => {});
  } else {
    beat().catch(() => {});
  }
});

/* extra keyboard */
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePanels();
});
</script>
