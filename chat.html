<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp Chat</title>

<style>
:root{
  --bg:#0f172a;
  --text:#e5e7eb;
  --box:#1e293b;
  --me:#6366f1;
}
body.light{
  --bg:#f3f4f6;
  --text:#111;
  --box:#ffffff;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
  pointer-events:none;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:var(--box);
  align-items:center;
  gap:10px;
}
#info{font-size:12px;opacity:.7}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{max-width:75%;}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}

.name{
  font-size:11px;
  font-weight:bold;
}

.bubble{
  padding:10px;
  border-radius:14px;
  background:var(--box);
  word-break:break-word;
}
.me .bubble{
  background:var(--me);
  color:#fff;
}

.meta{
  font-size:10px;
  opacity:.6;
  margin-top:4px;
}

.inputBox{
  display:flex;
  padding:8px;
  gap:6px;
  background:var(--box);
}
input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

#coins{
  font-size:12px;
  padding:6px 10px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">
  <div id="info"></div>

  <div style="display:flex;gap:8px;align-items:center;">
    <div id="coins">🪙 0</div>
    <button id="shopBtn">🛍</button>

    <select id="effect">
      <option value="none">None</option>
      <option value="snow">Snow</option>
      <option value="rain">Rain</option>
      <option value="thunder">Thunder</option>
    </select>

    <button id="theme">🌙</button>
  </div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message...">
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,collection,addDoc,query,orderBy,onSnapshot,
doc,setDoc,updateDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain:"temp-chat-6f08b.firebaseapp.com",
  projectId:"temp-chat-6f08b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const p=new URLSearchParams(location.search);
const user=p.get("user");
const room=p.get("room");

const chat=document.getElementById("chat");
const msgInput=document.getElementById("msg");
const info=document.getElementById("info");

let coins=parseInt(localStorage.getItem("coins")||"0");
function updateCoins(){
  document.getElementById("coins").innerText=`🪙 ${coins}`;
}
updateCoins();

let mode="none";
const effect=document.getElementById("effect");

const presRef=doc(db,"rooms",room,"presence",user);
await setDoc(presRef,{online:true});
window.addEventListener("beforeunload",()=>deleteDoc(presRef));

onSnapshot(collection(db,"rooms",room,"presence"),snap=>{
  let users=[];
  snap.forEach(d=>users.push(d.id));
  info.innerText=`${room} • ${users.length} online`;
});

const messagesRef=collection(db,"rooms",room,"messages");

async function send(){
  const text=msgInput.value.trim();
  if(!text)return;

  coins+=1;
  localStorage.setItem("coins",coins);
  updateCoins();

  await addDoc(messagesRef,{user,text,time:Date.now(),seenBy:[user]});
  msgInput.value="";
}

document.getElementById("sendBtn").onclick=send;
msgInput.addEventListener("keypress",e=>{if(e.key==="Enter")send();});

document.getElementById("shopBtn").onclick=()=>{
  alert("Shop coming soon: skins, colors, effects");
};

onSnapshot(query(messagesRef,orderBy("time")),snap=>{
  chat.innerHTML="";

  snap.forEach(docSnap=>{
    const m=docSnap.data();
    const div=document.createElement("div");
    div.className="msg "+(m.user===user?"me":"other");

    div.innerHTML=`
      <div class="name">${m.user}</div>
      <div class="bubble">
        ${m.text}
        <div class="meta">${new Date(m.time).toLocaleTimeString()}</div>
      </div>
    `;

    chat.appendChild(div);

    if(!m.seenBy?.includes(user)){
      updateDoc(doc(db,"rooms",room,"messages",docSnap.id),{
        seenBy:[...(m.seenBy||[]),user]
      });
    }
  });

  chat.scrollTop=chat.scrollHeight;
});


const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();window.onresize=resize;

effect.onchange=e=>mode=e.target.value;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(mode==="snow"){
    for(let i=0;i<40;i++)ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
  }

  if(mode==="rain"){
    for(let i=0;i<60;i++)ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1,10);
  }

  if(mode==="thunder"&&Math.random()<0.02){
    ctx.fillStyle="white";
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  requestAnimationFrame(draw);
}
draw();

</script>
</body>
</html>
