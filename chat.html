<!DOCTYPE html>
<html>
<head>
  <title>Temp Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f0f10;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    body.light {
      background: #f2f2f2;
      color: black;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .header {
      z-index: 2;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
    }

    .me { align-self: flex-end; text-align: right; }
    .other { align-self: flex-start; }

    .name {
      font-size: 11px;
      margin-bottom: 2px;
      font-weight: bold;
      background: linear-gradient(45deg, #ff7eb3, #7afcff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      background: #2b2d31;
    }

    .me .bubble {
      background: #5865f2;
      color: white;
    }

    .inputBox {
      z-index: 2;
      display: flex;
      padding: 10px;
      gap: 8px;
      background: rgba(0,0,0,0.4);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
      background: #1e1f22;
      color: white;
    }

    button, select {
      border-radius: 20px;
      border: none;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">
  <div id="roomInfo"></div>
  <div>
    <select id="effect">
      <option value="none">None</option>
      <option value="snow">Snow</option>
      <option value="rain">Rain</option>
      <option value="thunder">Thunder</option>
    </select>
    <button id="themeToggle">🌙</button>
  </div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Message..." />
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy, onSnapshot,
  doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain: "temp-chat-6f08b.firebaseapp.com",
  projectId: "temp-chat-6f08b",
  storageBucket: "temp-chat-6f08b.firebasestorage.app",
  messagingSenderId: "388611361050",
  appId: "1:388611361050:web:1db50e9927a3bc794e84a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// params
const params = new URLSearchParams(location.search);
const username = params.get("user");
const room = params.get("room");
const durationParam = params.get("duration") || "10m";

const durationMap = {
  "1m":60000,"5m":300000,"10m":600000,"1d":86400000,"7d":604800000
};
const duration = durationMap[durationParam];

document.getElementById("roomInfo").innerText = room + " • " + username;

// gradient per user
function getGradient(name){
  const colors = [
    ["#ff7eb3","#ff758c"],
    ["#7afcff","#00c6ff"],
    ["#fbc2eb","#a6c1ee"],
    ["#fddb92","#d1fdff"],
    ["#84fab0","#8fd3f4"]
  ];
  let index = name.length % colors.length;
  return colors[index];
}

// firestore
const roomRef = doc(db,"rooms",room);
await setDoc(roomRef,{createdAt:Date.now(),expireAt:Date.now()+duration},{merge:true});

const chatRef = collection(db,"rooms",room,"messages");

// send
async function send(){
  const text = msg.value.trim();
  if(!text) return;
  await addDoc(chatRef,{user:username,text,time:Date.now()});
  msg.value="";
}
sendBtn.onclick=send;
msg.onkeypress=e=>{if(e.key==="Enter")send()};

// listen
onSnapshot(query(chatRef,orderBy("time")),snap=>{
  chat.innerHTML="";
  snap.forEach(doc=>{
    const m=doc.data();
    const div=document.createElement("div");
    div.className="msg "+(m.user===username?"me":"other");

    const [c1,c2]=getGradient(m.user);

    div.innerHTML=`
      <div class="name" style="background:linear-gradient(45deg,${c1},${c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${m.user}
      </div>
      <div class="bubble">${m.text}</div>
    `;

    chat.appendChild(div);
  });
  chat.scrollTop=chat.scrollHeight;
});

// theme
themeToggle.onclick=()=>document.body.classList.toggle("light");

// effects
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let mode="none";
effect.onchange=e=>mode=e.target.value;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(mode==="snow"){
    for(let i=0;i<50;i++){
      ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
    }
  }

  if(mode==="rain"){
    for(let i=0;i<80;i++){
      ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1,10);
    }
  }

  if(mode==="thunder"){
    if(Math.random()<0.02){
      ctx.fillStyle="white";
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
  }

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
