<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibely Chat</title>
<style>
:root{
  --bg:#0f172a;
  --text:#e5e7eb;
  --box:#1e293b;
  --box2:#233047;
  --me:#6366f1;
  --border:rgba(255,255,255,.08);
  --muted:rgba(229,231,235,.7);
  --shadow:0 12px 40px rgba(0,0,0,.2);
  --accent:#7c3aed;
  --accent2:#22c55e;
}
body.light{
  --bg:#f3f4f6;
  --text:#111827;
  --box:#ffffff;
  --box2:#f9fafb;
  --border:rgba(15,23,42,.08);
  --muted:rgba(17,24,39,.65);
  --shadow:0 12px 40px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  overflow:hidden;
}

#sidebar{
  width:240px;
  border-right:1px solid var(--border);
  background:rgba(0,0,0,.04);
  display:flex;
  flex-direction:column;
  min-width:200px;
}
.sidebarHead{
  padding:12px;
  border-bottom:1px solid var(--border);
  font-size:14px;
  font-weight:800;
}
.sidebarBody{
  padding:10px;
  overflow:auto;
  flex:1;
}
.memberItem{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--box);
  margin-bottom:8px;
  font-size:12px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.memberItem.active::after{
  content:" • active";
  color:#22c55e;
  font-size:11px;
}

#main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.04);
  box-shadow:var(--shadow);
  z-index:5;
}
.headerLeft{min-width:0}
#info{font-size:12px;font-weight:800}
#status{font-size:11px;color:var(--muted);margin-top:2px;min-height:14px}
.headerRight{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button,select{border:none;outline:none;border-radius:14px;background:var(--box);color:var(--text);box-shadow:var(--shadow)}
button{cursor:pointer;padding:10px 12px}
select{padding:10px 12px}
button:hover,select:hover{filter:brightness(1.05)}
#coinsDisplay{display:flex;align-items:center;gap:6px;padding:9px 12px;border-radius:14px;background:linear-gradient(135deg, rgba(124,58,237,.18), rgba(34,197,94,.14));border:1px solid var(--border);box-shadow:var(--shadow);font-weight:800;font-size:13px;white-space:nowrap}
#coinsDisplay span{font-size:14px}

#chat{
  flex:1;
  overflow:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  scroll-behavior:smooth;
}
.msg{
  max-width:min(80%,620px);
  display:flex;
  flex-direction:column;
  gap:4px;
  animation:pop .15s ease-out;
}
@keyframes pop{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}
.name{font-size:11px;font-weight:800;line-height:1}
.bubble{
  padding:10px 12px;
  border-radius:16px;
  background:var(--box);
  border:1px solid var(--border);
  word-break:break-word;
  box-shadow:var(--shadow);
}
.me .bubble{background:linear-gradient(135deg,var(--me),#4f46e5);color:#fff;border-color:transparent}
.text{font-size:14px;line-height:1.45;white-space:pre-wrap}
.meta{font-size:10px;opacity:.7;margin-top:6px}
.actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:flex-end}
.btnSmall{font-size:10px;padding:4px 7px;border:none;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:inherit}
.other .btnSmall{background:rgba(0,0,0,.05)}
.btnSmall.delete{background:#7f1d1d;color:#fff}

#emojiBar{
  display:flex;
  gap:8px;
  padding:8px 12px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,.03);
  flex-wrap:wrap;
}
.emoji{cursor:pointer;font-size:18px;user-select:none}

.inputBox{
  display:flex;
  gap:8px;
  padding:10px 12px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,.04);
}
input{
  flex:1;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  outline:none;
  background:var(--box);
  color:var(--text);
  font:inherit;
}
button.send{border:none;border-radius:14px;padding:12px 14px;cursor:pointer;background:var(--me);color:#fff;font-weight:700}

/* panels */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.45);
  opacity:0;
  pointer-events:none;
  transition:.2s ease;
  z-index:20;
}
#overlay.active{opacity:1;pointer-events:auto}
.panel{
  position:fixed;
  top:0;
  right:0;
  width:min(350px,90vw);
  height:100%;
  background:var(--box);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:.22s ease;
  z-index:25;
  display:flex;
  flex-direction:column;
  box-shadow:-16px 0 40px rgba(0,0,0,.18);
}
.panel.active{transform:translateX(0)}
.panelTop{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border)}
.panelTop strong{font-size:15px}
.panelSub{padding:0 14px 12px;font-size:12px;color:var(--muted);line-height:1.4}
.panelList{padding:10px 10px 14px;overflow:auto;flex:1}
.panelItem{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:14px;background:var(--box2);border:1px solid var(--border);margin-bottom:8px}
.panelLeft{display:flex;align-items:center;gap:10px;min-width:0}
.dot{width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.12);flex-shrink:0}
.panelTitle{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panelMeta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}
.priceTag{font-size:10px;padding:4px 8px;border-radius:999px;background:rgba(124,58,237,.14);color:#a78bfa;border:1px solid rgba(124,58,237,.18);flex-shrink:0;white-space:nowrap}
.actionBtn{padding:8px 10px;border-radius:12px;background:linear-gradient(135deg,var(--me),#4f46e5);color:#fff;font-size:12px;font-weight:800;flex-shrink:0}
.emptyState{padding:18px 12px;color:var(--muted);font-size:13px;text-align:center}

/* cosmetic themes */
body.theme-glow{--me:#d946ef}
body.theme-fire{--me:#f97316}
body.theme-ocean{--me:#06b6d4}
body.theme-mint{--me:#22c55e}
body.theme-gold{--me:#eab308}
.msg.bubble-soft .bubble{border-radius:20px}
.msg.bubble-pill .bubble{border-radius:999px}
.msg.bubble-neon .bubble{border:1px solid rgba(167,139,250,.4);box-shadow:0 0 0 1px rgba(167,139,250,.12), 0 0 22px rgba(124,58,237,.18)}
.msg.bubble-glass .bubble{background:rgba(255,255,255,.08);backdrop-filter:blur(10px)}
body.light .msg.bubble-glass .bubble{background:rgba(255,255,255,.72)}

@media (max-width:760px){
  #sidebar{display:none}
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebarHead">Members</div>
  <div class="sidebarBody" id="members"></div>
</div>

<div id="main">
  <div class="header">
    <div class="headerLeft">
      <div id="info"></div>
      <div id="status"></div>
    </div>
    <div class="headerRight">
      <div id="coinsDisplay" title="Your coins"><span>🪙</span><span id="coinsCount">0</span></div>
      <button id="membersBtn" title="Members">👥</button>
      <button id="shopBtn" title="Shop">🛍</button>
      <button id="emojiBtn" title="Emoji">😊</button>
      <button id="copyLink" title="Copy room link">🔗</button>
      <select id="effect" aria-label="Background effect">
        <option value="none">None</option>
        <option value="snow">Snow</option>
        <option value="rain">Rain</option>
        <option value="thunder">Thunder</option>
      </select>
      <button id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </div>

  <div id="chat"></div>

  <div id="emojiBar">
    <span class="emoji">😀</span>
    <span class="emoji">😂</span>
    <span class="emoji">🔥</span>
    <span class="emoji">👍</span>
    <span class="emoji">❤️</span>
  </div>

  <div class="inputBox">
    <input id="msg" placeholder="Type message..." autocomplete="off" />
    <button class="send" id="sendBtn">Send</button>
  </div>
</div>

<div id="overlay"></div>
<div class="panel" id="shopPanel" aria-hidden="true">
  <div class="panelTop"><strong>Shop</strong><button id="closeShop" class="send" style="padding:8px 10px">✖</button></div>
  <div class="panelSub" id="shopCoinsInfo">Coins follow your username across rooms.</div>
  <div class="panelList" id="shopList"></div>
</div>
<div class="panel" id="emojiPanel" aria-hidden="true">
  <div class="panelTop"><strong>Emoji</strong><button id="closeEmoji" class="send" style="padding:8px 10px">✖</button></div>
  <div class="panelSub">Tap an emoji to insert it into your message.</div>
  <div class="panelList" id="emojiList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain: "temp-chat-6f08b.firebaseapp.com",
  projectId: "temp-chat-6f08b"
});

const db = getFirestore(app);
const params = new URLSearchParams(location.search);
const room = params.get("room") || "global";
const user = params.get("user") || localStorage.getItem("vibely-username") || "guest";
if (!params.get("user")) localStorage.setItem("vibely-username", user);
const userKey = user.toLowerCase().replace(/[^a-z0-9]+/g, "_") || "guest";

const STORAGE = {
  coins: `vibely-coins-${userKey}`,
  prefs: `vibely-prefs-${userKey}`,
  unlocks: `vibely-unlocks-${userKey}`,
  daily: `vibely-daily-${userKey}`
};

const state = {
  coins: 0,
  prefs: { bubble: "soft", nameGlow: "none", themeClass: "", effect: "none" },
  typingTimer: null,
  panels: { shop: false, emoji: false }
};

const SHOP = [
  { id:"bubble-soft", title:"Soft Bubbles", price:0, desc:"Cleaner rounded chat bubbles." },
  { id:"bubble-pill", title:"Pill Bubbles", price:25, desc:"Big smooth bubble style." },
  { id:"bubble-neon", title:"Neon Bubbles", price:45, desc:"A glowing chat look." },
  { id:"bubble-glass", title:"Glass Bubbles", price:60, desc:"Soft transparent feel." },
  { id:"theme-glow", title:"Glow Theme", price:40, desc:"Pink-violet send color." },
  { id:"theme-fire", title:"Fire Theme", price:50, desc:"Warm fire-orange send color." },
  { id:"theme-ocean", title:"Ocean Theme", price:50, desc:"Fresh cyan send color." },
  { id:"theme-mint", title:"Mint Theme", price:50, desc:"Green fresh send color." },
  { id:"theme-gold", title:"Gold Theme", price:65, desc:"Premium gold send color." },
  { id:"name-rainbow", title:"Rainbow Name", price:35, desc:"Your name gets a rainbow glow." },
  { id:"name-gold", title:"Gold Name", price:55, desc:"Premium gold name style." },
  { id:"effect-rain", title:"Rain Effect", price:15, desc:"Unlock rainy background." },
  { id:"effect-snow", title:"Snow Effect", price:15, desc:"Unlock snowy background." },
  { id:"effect-thunder", title:"Thunder Effect", price:20, desc:"Unlock thunder flash background." }
];
const EMOJIS = ["😀","😂","🔥","👍","❤️","😎","😳","💯","✨","🤝","💀","😍"];

const el = {
  members: document.getElementById("members"),
  info: document.getElementById("info"),
  status: document.getElementById("status"),
  coins: document.getElementById("coinsCount"),
  chat: document.getElementById("chat"),
  msg: document.getElementById("msg"),
  sendBtn: document.getElementById("sendBtn"),
  themeBtn: document.getElementById("themeBtn"),
  membersBtn: document.getElementById("membersBtn"),
  shopBtn: document.getElementById("shopBtn"),
  emojiBtn: document.getElementById("emojiBtn"),
  copyLink: document.getElementById("copyLink"),
  effect: document.getElementById("effect"),
  overlay: document.getElementById("overlay"),
  shopPanel: document.getElementById("shopPanel"),
  emojiPanel: document.getElementById("emojiPanel"),
  closeShop: document.getElementById("closeShop"),
  closeEmoji: document.getElementById("closeEmoji"),
  shopList: document.getElementById("shopList"),
  emojiList: document.getElementById("emojiList"),
  shopCoinsInfo: document.getElementById("shopCoinsInfo")
};

function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch{
    return fallback;
  }
}
function saveJSON(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function renderCoins(){
  el.coins.textContent = String(state.coins);
  localStorage.setItem(STORAGE.coins, String(state.coins));
}
function addCoins(n){
  state.coins = Math.max(0, state.coins + n);
  renderCoins();
}
function getUnlocks(){ return loadJSON(STORAGE.unlocks, { "bubble-soft": true }); }
function saveUnlocks(u){ saveJSON(STORAGE.unlocks, u); }
function isUnlocked(id){ return !!getUnlocks()[id]; }
function unlock(id){ const u = getUnlocks(); u[id] = true; saveUnlocks(u); }
function savePrefs(){ saveJSON(STORAGE.prefs, state.prefs); }
function loadPrefs(){
  const p = loadJSON(STORAGE.prefs, null);
  if (p && typeof p === "object") state.prefs = { ...state.prefs, ...p };
}
function grad(name){
  const g = [["#ff7eb3","#ff758c"],["#7afcff","#00c6ff"],["#fbc2eb","#a6c1ee"],["#fddb92","#d1fdff"],["#84fab0","#8fd3f4"]];
  return g[name.length % g.length];
}
function renderName(name){
  const safe = String(name || "Unknown");
  if (state.prefs.nameGlow === "rainbow") return `<span style="background:linear-gradient(90deg,#ff4d6d,#ffbd59,#7bffb2,#5ed3ff,#c77dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">${safe}</span>`;
  if (state.prefs.nameGlow === "gold") return `<span style="background:linear-gradient(90deg,#fbbf24,#fde68a,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">${safe}</span>`;
  const [c1,c2] = grad(safe);
  return `<span style="background:linear-gradient(45deg,${c1},${c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">${safe}</span>`;
}
function applyTheme(theme){
  document.body.classList.toggle("light", theme === "light");
  el.themeBtn.textContent = theme === "light" ? "☀" : "🌙";
  localStorage.setItem("vibely-theme", theme);
}
function currentTheme(){
  const saved = localStorage.getItem("vibely-theme");
  if (saved === "light" || saved === "dark") return saved;
  return matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}
function applyCosmetics(){
  document.body.classList.remove("theme-glow","theme-fire","theme-ocean","theme-mint","theme-gold");
  if (state.prefs.themeClass) document.body.classList.add(state.prefs.themeClass);
  el.effect.value = state.prefs.effect || "none";
  document.querySelectorAll(".msg").forEach(n => {
    n.classList.remove("bubble-soft","bubble-pill","bubble-neon","bubble-glass");
    n.classList.add(`bubble-${state.prefs.bubble}`);
  });
}
function setPanel(panel, on){
  state.panels[panel] = on;
  el.overlay.classList.toggle("active", state.panels.shop || state.panels.emoji);
  el.shopPanel.classList.toggle("active", state.panels.shop);
  el.emojiPanel.classList.toggle("active", state.panels.emoji);
}
function closePanels(){
  setPanel("shop", false);
  setPanel("emoji", false);
}
function renderMembers(list){
  el.members.innerHTML = "";
  if (!list.length){
    el.members.innerHTML = '<div class="emptyState">No one active right now.</div>';
    return;
  }
  list.forEach(m => {
    const row = document.createElement("div");
    row.className = "memberItem active";
    row.innerHTML = renderName(m.id);
    el.members.appendChild(row);
  });
}
function renderShop(){
  el.shopCoinsInfo.textContent = `Coins: ${state.coins}. Coins follow your username across rooms.`;
  el.shopList.innerHTML = "";
  SHOP.forEach(item => {
    const owned = isUnlocked(item.id);
    const active = (
      (item.id.startsWith("bubble-") && state.prefs.bubble === item.id.replace("bubble-", "")) ||
      (item.id.startsWith("theme-") && state.prefs.themeClass === item.id) ||
      (item.id.startsWith("effect-") && state.prefs.effect === item.id.replace("effect-", "")) ||
      (item.id === "name-rainbow" && state.prefs.nameGlow === "rainbow") ||
      (item.id === "name-gold" && state.prefs.nameGlow === "gold")
    );
    const row = document.createElement("div");
    row.className = "panelItem";
    row.innerHTML = `
      <div class="panelLeft">
        <div class="dot" style="background:${owned ? '#22c55e' : '#a78bfa'};box-shadow:${owned ? '0 0 0 4px rgba(34,197,94,.12)' : '0 0 0 4px rgba(167,139,250,.12)'}"></div>
        <div style="min-width:0">
          <div class="panelTitle"></div>
          <div class="panelMeta"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <div class="priceTag">🪙 ${item.price}</div>
        <button class="actionBtn"></button>
      </div>
    `;
    row.querySelector(".panelTitle").textContent = item.title;
    row.querySelector(".panelMeta").textContent = item.desc;
    const btn = row.querySelector(".actionBtn");
    btn.textContent = active ? "Equipped" : owned ? "Use" : `Buy ${item.price}`;
    btn.onclick = () => buyItem(item);
    el.shopList.appendChild(row);
  });
}
function renderEmoji(){
  el.emojiList.innerHTML = "";
  EMOJIS.forEach(sym => {
    const row = document.createElement("div");
    row.className = "panelItem";
    row.innerHTML = `
      <div class="panelLeft">
        <div style="font-size:22px">${sym}</div>
        <div>
          <div class="panelTitle">${sym}</div>
          <div class="panelMeta">Insert into your message</div>
        </div>
      </div>
      <button class="actionBtn">Use</button>
    `;
    row.querySelector("button").onclick = () => {
      el.msg.value += sym;
      el.msg.focus();
      closePanels();
    };
    el.emojiList.appendChild(row);
  });
}
function activateItem(id){
  if (id.startsWith("bubble-")) state.prefs.bubble = id.replace("bubble-", "");
  if (id.startsWith("theme-")) state.prefs.themeClass = id;
  if (id.startsWith("effect-")) state.prefs.effect = id.replace("effect-", "");
  if (id === "name-rainbow") state.prefs.nameGlow = "rainbow";
  if (id === "name-gold") state.prefs.nameGlow = "gold";
  savePrefs();
  applyCosmetics();
}
function buyItem(item){
  if (!item) return;
  const owned = isUnlocked(item.id);
  if (owned){
    activateItem(item.id);
    renderShop();
    return;
  }
  if (state.coins < item.price){
    alert(`Need ${item.price} coins.`);
    return;
  }
  state.coins -= item.price;
  renderCoins();
  unlock(item.id);
  activateItem(item.id);
  renderShop();
}
function appendLocalMessage(messageText, messageTime){
  const div = document.createElement("div");
  div.className = "msg me";
  div.classList.add(`bubble-${state.prefs.bubble}`);
  div.innerHTML = `
    <div class="name">${renderName(user)}</div>
    <div class="bubble">
      <div class="text"></div>
      <div class="meta"></div>
      <div class="actions"></div>
    </div>
  `;
  div.querySelector(".text").textContent = messageText;
  div.querySelector(".meta").textContent = new Date(messageTime).toLocaleTimeString();
  el.chat.appendChild(div);
  el.chat.scrollTop = el.chat.scrollHeight;
}

/* top-level UI */
el.themeBtn.onclick = () => applyTheme(document.body.classList.contains("light") ? "dark" : "light");
el.membersBtn = document.getElementById("membersBtn");
el.shopBtn = document.getElementById("shopBtn");
el.emojiBtn = document.getElementById("emojiBtn");
el.copyLink = document.getElementById("copyLink");
el.membersBtn.onclick = () => {};
el.shopBtn.onclick = () => { renderShop(); setPanel("shop", true); };
el.emojiBtn.onclick = () => { renderEmoji(); setPanel("emoji", true); };
el.closeShop = document.getElementById("closeShop");
el.closeEmoji = document.getElementById("closeEmoji");
el.closeShop.onclick = closePanels;
el.closeEmoji.onclick = closePanels;
el.overlay.onclick = closePanels;
el.copyLink.onclick = async () => {
  try{
    await navigator.clipboard.writeText(location.href);
    const prev = el.copyLink.textContent;
    el.copyLink.textContent = "✓";
    setTimeout(() => el.copyLink.textContent = prev, 900);
  }catch{}
};

applyTheme(currentTheme());
loadPrefs();
state.coins = Number(localStorage.getItem(STORAGE.coins) || 0);
renderCoins();
applyCosmetics();
renderShop();
renderEmoji();

/* room / presence */
const presenceRef = doc(db, "rooms", room, "presence", user);
const typingRef = doc(db, "rooms", room, "typing", user);
const messagesRef = collection(db, "rooms", room, "messages");

async function ping(){
  await setDoc(presenceRef, { user, lastSeen: Date.now(), room }, { merge: true });
}
ping().catch(() => {});
setInterval(() => ping().catch(() => {}), 4000);
window.addEventListener("beforeunload", () => {
  deleteDoc(presenceRef).catch(() => {});
  deleteDoc(typingRef).catch(() => {});
});

async function setTyping(on){
  if (on) await setDoc(typingRef, { user, room, lastSeen: Date.now() }, { merge: true });
  else await deleteDoc(typingRef).catch(() => {});
}

/* members live */
onSnapshot(collection(db, "rooms", room, "presence"), snap => {
  const now = Date.now();
  const active = [];
  snap.forEach(d => {
    const data = d.data() || {};
    if (now - Number(data.lastSeen || 0) < 7000) active.push({ id: d.id, lastSeen: Number(data.lastSeen || 0) });
  });
  active.sort((a,b) => b.lastSeen - a.lastSeen);
  renderMembers(active);
  el.info.textContent = `${room} • ${active.length} online`;
}, err => {
  console.error(err);
  el.info.textContent = `${room}`;
  el.status.textContent = `presence unavailable`;
});

/* typing live */
onSnapshot(collection(db, "rooms", room, "typing"), snap => {
  const now = Date.now();
  const others = [];
  snap.forEach(d => {
    if (d.id === user) return;
    const data = d.data() || {};
    if (now - Number(data.lastSeen || 0) < 2500) others.push(d.id);
  });
  if (!others.length) el.status.textContent = "";
  else if (others.length === 1) el.status.textContent = `${others[0]} is typing...`;
  else el.status.textContent = `${others.length} people are typing...`;
}, err => {
  console.error(err);
  el.status.textContent = "";
});

/* daily bonus */
const todayKey = `${STORAGE.daily}-${new Date().toDateString()}`;
if (!localStorage.getItem(todayKey)){
  state.coins += 5;
  renderCoins();
  localStorage.setItem(todayKey, "1");
}

/* typing input */
el.msg.addEventListener("input", () => {
  clearTimeout(state.typingTimer);
  if (!el.msg.value.trim()) {
    setTyping(false).catch(() => {});
    return;
  }
  setTyping(true).catch(() => {});
  state.typingTimer = setTimeout(() => setTyping(false).catch(() => {}), 1500);
});

/* send message */
async function send(){
  const text = el.msg.value.trim();
  if (!text) return;
  const payload = { user, text, time: Date.now(), likes: [] };
  el.msg.value = "";
  setTyping(false).catch(() => {});
  try{
    await addDoc(messagesRef, payload);
    state.coins += 1;
    renderCoins();
  }catch(err){
    console.error(err);
    appendLocalMessage(text, payload.time);
  }
}
el.sendBtn = document.getElementById("sendBtn");
el.sendBtn.onclick = send;
el.msg.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

/* emojis insert */
document.querySelectorAll(".emoji").forEach(btn => {
  btn.addEventListener("click", () => {
    el.msg.value += btn.textContent;
    el.msg.focus();
  });
});

/* messages live */
function renderMessage(docSnap){
  const m = docSnap.data();
  const mine = m.user === user;
  const div = document.createElement("div");
  div.className = `msg ${mine ? "me" : "other"}`;
  div.classList.add(`bubble-${state.prefs.bubble}`);
  const likes = Array.isArray(m.likes) ? m.likes : [];

  div.innerHTML = `
    <div class="name">${renderName(m.user || "Unknown")}</div>
    <div class="bubble">
      <div class="text"></div>
      <div class="meta"></div>
      <div class="actions"></div>
    </div>
  `;
  div.querySelector(".text").textContent = m.text || "";
  div.querySelector(".meta").textContent = new Date(m.time || Date.now()).toLocaleTimeString();

  const actions = div.querySelector(".actions");

  const likeBtn = document.createElement("button");
  likeBtn.className = "btnSmall";
  likeBtn.textContent = `🔥 ${likes.length}`;
  likeBtn.onclick = async () => {
    const current = Array.isArray(m.likes) ? m.likes : [];
    const next = current.includes(user) ? current.filter(x => x !== user) : [...current, user];
    try{
      await updateDoc(doc(db, "rooms", room, "messages", docSnap.id), { likes: next });
      state.coins += 1;
      renderCoins();
    }catch(err){ console.error(err); }
  };
  actions.appendChild(likeBtn);

  if (mine) {
    const delBtn = document.createElement("button");
    delBtn.className = "btnSmall delete";
    delBtn.textContent = "🗑";
    delBtn.onclick = () => deleteDoc(doc(db, "rooms", room, "messages", docSnap.id)).catch(() => {});
    actions.appendChild(delBtn);
  }

  return div;
}

onSnapshot(query(messagesRef, orderBy("time")), snap => {
  const isAtBottom = el.chat.scrollHeight - el.chat.scrollTop - el.chat.clientHeight < 90;
  el.chat.innerHTML = "";
  snap.forEach(docSnap => el.chat.appendChild(renderMessage(docSnap)));
  applyCosmetics();
  if (isAtBottom) el.chat.scrollTop = el.chat.scrollHeight;
}, err => {
  console.error(err);
  el.status.textContent = "messages unavailable";
});

/* background effects */
const canvas = document.createElement("canvas");
canvas.style.position = "fixed";
canvas.style.inset = "0";
canvas.style.zIndex = "-1";
canvas.style.pointerEvents = "none";
document.body.appendChild(canvas);
const ctx = canvas.getContext("2d");
let bgMode = state.prefs.effect || "none";
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener("resize", resize);
el.effect.onchange = e => {
  bgMode = e.target.value;
  state.prefs.effect = bgMode;
  savePrefs();
};
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const light = document.body.classList.contains("light");
  if (bgMode === "snow") {
    for (let i=0;i<40;i++) {
      ctx.fillStyle = light ? "rgba(17,24,39,.18)" : "rgba(255,255,255,.28)";
      ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
    }
  } else if (bgMode === "rain") {
    for (let i=0;i<60;i++) {
      ctx.fillStyle = light ? "rgba(17,24,39,.2)" : "rgba(255,255,255,.22)";
      ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 10);
    }
  } else if (bgMode === "thunder" && Math.random() < 0.02) {
    ctx.fillStyle = "rgba(255,255,255,.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  requestAnimationFrame(draw);
}
draw();

/* open/close panels */
el.overlay.onclick = closePanels;
el.closeShop.onclick = closePanels;
el.closeEmoji.onclick = closePanels;
el.shopBtn.onclick = () => { renderShop(); setPanel("shop", true); };
el.emojiBtn.onclick = () => { renderEmoji(); setPanel("emoji", true); };

document.getElementById("membersBtn").onclick = () => {
  // Members are always visible in the sidebar on desktop.
  if (window.innerWidth <= 760) alert("Members list is hidden on small screens.");
};

document.addEventListener("keydown", e => { if (e.key === "Escape") closePanels(); });
</script>
</body>
