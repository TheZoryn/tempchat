<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibely Chat (Stable)</title>
<style>
:root{
  --bg:#0f172a;
  --text:#e5e7eb;
  --box:#1e293b;
  --me:#6366f1;
  --border:rgba(255,255,255,.08);
  --muted:rgba(229,231,235,.7);
}
body.light{
  --bg:#f3f4f6;
  --text:#111827;
  --box:#ffffff;
  --border:rgba(15,23,42,.08);
  --muted:rgba(17,24,39,.65);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.05);
}
#info{font-size:12px;font-weight:700}
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.msg{max-width:75%}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}
.bubble{
  padding:10px;
  border-radius:14px;
  background:var(--box);
  border:1px solid var(--border);
  word-break:break-word;
}
.me .bubble{background:var(--me);color:white}
.meta{font-size:10px;opacity:.7;margin-top:4px}
.inputBox{
  display:flex;
  padding:10px;
  border-top:1px solid var(--border);
  gap:8px;
}
input{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--border);
  outline:none;
  background:var(--box);
  color:var(--text);
}
button{
  padding:10px 14px;
  border:none;
  border-radius:14px;
  cursor:pointer;
}
#sendBtn{background:var(--me);color:white}
</style>
</head>
<body>

<div class="header">
  <div id="info">Connecting...</div>
  <button id="themeBtn">🌙</button>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message..." />
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain:"temp-chat-6f08b.firebaseapp.com",
  projectId:"temp-chat-6f08b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const room = params.get("room") || "global";
let user = params.get("user") || "guest";

const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const info = document.getElementById("info");
const sendBtn = document.getElementById("sendBtn");

/* SAFE STATE (FIX FOR YOUR ERROR) */
let mode = "none"; // FIX: defined before any use

/* THEME */
document.getElementById("themeBtn").onclick = () => {
  document.body.classList.toggle("light");
};

/* PRESENCE */
const presenceRef = doc(db,"rooms",room,"presence",user);
setDoc(presenceRef,{online:true,last:Date.now()});
setInterval(()=>setDoc(presenceRef,{online:true,last:Date.now()}),4000);
window.addEventListener("beforeunload",()=>deleteDoc(presenceRef));

onSnapshot(collection(db,"rooms",room,"presence"),(snap)=>{
  let users=0;
  snap.forEach(()=>users++);
  info.textContent = `${room} • ${users} online`;
});

/* SEND */
async function send(){
  const text = msg.value.trim();
  if(!text) return;
  msg.value="";

  await addDoc(collection(db,"rooms",room,"messages"),{
    user,text,time:Date.now()
  });
}

sendBtn.onclick = send;
msg.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

/* MESSAGES */
onSnapshot(query(collection(db,"rooms",room,"messages"),orderBy("time")),snap=>{
  chat.innerHTML="";

  snap.forEach(d=>{
    const m=d.data();
    const div=document.createElement("div");
    div.className="msg"+(m.user===user?" me":" other");

    div.innerHTML=`
      <div class="bubble">
        <b>${m.user}</b><br>
        ${m.text}
        <div class="meta">${new Date(m.time).toLocaleTimeString()}</div>
      </div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
});

</script>
</body>
</html>
