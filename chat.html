<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibely Chat</title>
<style>
:root{
  --bg:#0f172a;
  --text:#e5e7eb;
  --box:#1e293b;
  --me:#6366f1;
  --border:rgba(255,255,255,.08);
  --muted:rgba(229,231,235,.7);
}
body.light{
  --bg:#f3f4f6;
  --text:#111827;
  --box:#ffffff;
  --border:rgba(15,23,42,.08);
  --muted:rgba(17,24,39,.65);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  overflow:hidden;
}

#side{
  width:220px;
  border-right:1px solid var(--border);
  padding:10px;
  overflow:auto;
  background:rgba(0,0,0,.04);
}
#side h3{margin:0 0 10px;font-size:14px}
#members{display:flex;flex-direction:column;gap:6px}
.member{
  font-size:12px;
  padding:6px 8px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--box);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

#chatWrap{flex:1;display:flex;flex-direction:column;min-width:0}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.04);
}
#info{font-size:12px;font-weight:700}
#coins{font-size:12px;opacity:.8;margin-top:2px}
#themeBtn{border:none;border-radius:12px;padding:10px 12px;cursor:pointer;background:var(--box);color:var(--text)}

#chat{
  flex:1;
  overflow:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.msg{max-width:min(80%,620px);display:flex;flex-direction:column;gap:4px}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}
.name{font-size:11px;font-weight:800;line-height:1}
.bubble{
  padding:10px 12px;
  border-radius:16px;
  background:var(--box);
  border:1px solid var(--border);
  word-break:break-word;
}
.me .bubble{background:linear-gradient(135deg,var(--me),#4f46e5);color:#fff;border-color:transparent}
.meta{font-size:10px;opacity:.7;margin-top:6px}
.actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;justify-content:flex-end}
.btnSmall{
  font-size:10px;
  padding:4px 7px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:rgba(255,255,255,.12);
  color:inherit;
}
.other .btnSmall{background:rgba(0,0,0,.05)}
.btnSmall.delete{background:#7f1d1d;color:#fff}

#emojiBar{
  display:flex;
  gap:8px;
  padding:8px 12px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,.03);
  flex-wrap:wrap;
}
.emoji{cursor:pointer;font-size:18px;user-select:none}

.inputBox{
  display:flex;
  gap:8px;
  padding:10px 12px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,.04);
}
input{
  flex:1;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  outline:none;
  background:var(--box);
  color:var(--text);
  font:inherit;
}
button.send{
  border:none;
  border-radius:14px;
  padding:12px 14px;
  cursor:pointer;
  background:var(--me);
  color:#fff;
  font-weight:700;
}

@media (max-width:720px){
  #side{display:none}
}
</style>
</head>
<body>

<div id="side">
  <h3>Members</h3>
  <div id="members"></div>
</div>

<div id="chatWrap">
  <div class="header">
    <div>
      <div id="info">room</div>
      <div id="coins">coins: 0</div>
    </div>
    <button id="themeBtn">🌙</button>
  </div>

  <div id="chat"></div>

  <div id="emojiBar">
    <span class="emoji">😀</span>
    <span class="emoji">😂</span>
    <span class="emoji">🔥</span>
    <span class="emoji">👍</span>
    <span class="emoji">❤️</span>
  </div>

  <div class="inputBox">
    <input id="msg" placeholder="Type message..." autocomplete="off" />
    <button class="send" id="sendBtn">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain: "temp-chat-6f08b.firebaseapp.com",
  projectId: "temp-chat-6f08b"
});

const db = getFirestore(app);
const params = new URLSearchParams(location.search);
const room = params.get("room") || "global";
let user = params.get("user") || localStorage.getItem("vibely-username") || "guest";
if (!params.get("user")) localStorage.setItem("vibely-username", user);

const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const members = document.getElementById("members");
const coinsUI = document.getElementById("coins");
const info = document.getElementById("info");
const themeBtn = document.getElementById("themeBtn");
const sendBtn = document.getElementById("sendBtn");

function setTheme(theme){
  document.body.classList.toggle("light", theme === "light");
  themeBtn.textContent = theme === "light" ? "☀" : "🌙";
  localStorage.setItem("vibely-theme", theme);
}
setTheme(localStorage.getItem("vibely-theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));
themeBtn.onclick = () => setTheme(document.body.classList.contains("light") ? "dark" : "light");

info.textContent = `${room} • ${user}`;

let coins = Number(localStorage.getItem("coins") || 0);
function renderCoins(){
  coinsUI.textContent = `coins: ${coins}`;
  localStorage.setItem("coins", String(coins));
}
renderCoins();
function addCoins(n){
  coins += n;
  renderCoins();
}

/* presence */
const presenceRef = doc(db, "rooms", room, "presence", user);
async function ping(){
  await setDoc(presenceRef, { lastSeen: Date.now(), user }, { merge: true });
}
try{
  await ping();
  setInterval(() => ping().catch(() => {}), 4000);
}catch(err){
  console.error(err);
}
window.addEventListener("beforeunload", () => {
  deleteDoc(presenceRef).catch(() => {});
});

onSnapshot(collection(db, "rooms", room, "presence"), snap => {
  members.innerHTML = "";
  snap.forEach(d => {
    const div = document.createElement("div");
    div.className = "member";
    div.textContent = d.id;
    members.appendChild(div);
  });
}, err => console.error(err));

/* emoji insert */
document.querySelectorAll(".emoji").forEach(el => {
  el.addEventListener("click", () => {
    msg.value += el.textContent;
    msg.focus();
  });
});

/* send */
const messagesRef = collection(db, "rooms", room, "messages");
async function send(){
  const text = msg.value.trim();
  if (!text) return;
  msg.value = "";
  try{
    await addDoc(messagesRef, {
      user,
      text,
      time: Date.now(),
      likes: []
    });
    addCoins(1);
  }catch(err){
    console.error(err);
    alert("Message failed to send.");
  }
}
sendBtn.addEventListener("click", send);
msg.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

/* messages */
onSnapshot(query(messagesRef, orderBy("time")), snap => {
  chat.innerHTML = "";
  snap.forEach(d => {
    const m = d.data();
    const mine = m.user === user;
    const div = document.createElement("div");
    div.className = "msg" + (mine ? " me" : " other");

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = m.user || "Unknown";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const text = document.createElement("div");
    text.textContent = m.text || "";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = new Date(m.time || Date.now()).toLocaleTimeString();

    const actions = document.createElement("div");
    actions.className = "actions";

    const likeBtn = document.createElement("button");
    likeBtn.className = "btnSmall";
    const likesArr = Array.isArray(m.likes) ? m.likes : [];
    likeBtn.textContent = `🔥 ${likesArr.length}`;
    likeBtn.addEventListener("click", async () => {
      const current = Array.isArray(m.likes) ? m.likes : [];
      const next = current.includes(user) ? current.filter(x => x !== user) : [...current, user];
      try{
        await updateDoc(doc(db, "rooms", room, "messages", d.id), { likes: next });
      }catch(err){
        console.error(err);
      }
    });

    actions.appendChild(likeBtn);

    if (mine) {
      const delBtn = document.createElement("button");
      delBtn.className = "btnSmall delete";
      delBtn.textContent = "🗑";
      delBtn.addEventListener("click", async () => {
        try{
          await deleteDoc(doc(db, "rooms", room, "messages", d.id));
        }catch(err){
          console.error(err);
        }
      });
      actions.appendChild(delBtn);
    }

    bubble.appendChild(text);
    bubble.appendChild(meta);
    bubble.appendChild(actions);

    div.appendChild(name);
    div.appendChild(bubble);
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}, err => console.error(err));
</script>
</body>
</html>
