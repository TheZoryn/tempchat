<!DOCTYPE html>
<html>
<head>
  <title>Temp Chat</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f0f10;
      color: white;
    }

    .header {
      padding: 12px;
      border-bottom: 1px solid #222;
      font-weight: 600;
    }

    #chat {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg {
      padding: 8px 12px;
      border-radius: 14px;
      max-width: fit-content;
      font-size: 14px;
      line-height: 1.4;
    }

    .me {
      background: #5865f2;
      align-self: flex-end;
    }

    .other {
      background: #2b2d31;
      align-self: flex-start;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      border-top: 1px solid #222;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #1e1f22;
      color: white;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 20px;
      background: #5865f2;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">
  <div id="roomName"></div>
  <div id="userName" style="font-size:12px; opacity:0.6;"></div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type a message..." />
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain: "temp-chat-6f08b.firebaseapp.com",
  projectId: "temp-chat-6f08b",
  storageBucket: "temp-chat-6f08b.firebasestorage.app",
  messagingSenderId: "388611361050",
  appId: "1:388611361050:web:1db50e9927a3bc794e84a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GET USER + ROOM
const params = new URLSearchParams(window.location.search);
const username = params.get("user") || localStorage.getItem("username");
const room = params.get("room") || localStorage.getItem("room");

if (!username || !room) {
  window.location.href = "index.html";
}

// HEADER
document.getElementById("roomName").innerText = "Room: " + room;
document.getElementById("userName").innerText = "You: " + username;

// FIRESTORE
const chatRef = collection(db, "rooms", room, "messages");

// SEND
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  await addDoc(chatRef, {
    text: text,
    user: username,
    time: Date.now()
  });

  input.value = "";
}

// BUTTON CLICK
document.getElementById("sendBtn").addEventListener("click", send);

// ENTER KEY (PC + MOBILE)
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

// LIVE MESSAGES
const q = query(chatRef, orderBy("time"));

onSnapshot(q, (snapshot) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  snapshot.forEach((doc) => {
    const m = doc.data();

    const div = document.createElement("div");
    div.className = "msg " + (m.user === username ? "me" : "other");
    div.innerHTML = "<b>" + m.user + "</b><br>" + m.text;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
