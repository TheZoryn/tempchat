<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibely Chat</title>

<style>
:root{
  --bg:#0f172a;
  --text:#e5e7eb;
  --box:#1e293b;
  --me:#6366f1;
}
body.light{
  --bg:#f3f4f6;
  --text:#111;
  --box:#ffffff;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
  pointer-events:none;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:var(--box);
  align-items:center;
}

#info{font-size:12px;opacity:.7}

/* typing indicator */
#typing{
  font-size:12px;
  padding:4px 10px;
  opacity:.8;
  height:18px;
}

/* chat */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  max-width:75%;
}
.me{align-self:flex-end;text-align:right}
.other{align-self:flex-start}

/* bubble */
.bubble{
  padding:10px;
  border-radius:14px;
  background:var(--box);
  word-break:break-word;
}
.me .bubble{
  background:var(--me);
  color:#fff;
}

/* meta */
.meta{
  font-size:10px;
  opacity:.6;
  margin-top:4px;
}

/* input */
.inputBox{
  display:flex;
  padding:8px;
  gap:6px;
  background:var(--box);
}
input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">
  <div>
    <div id="info"></div>
    <div id="typing"></div>
  </div>

  <div>
    <select id="effect">
      <option value="none">None</option>
      <option value="snow">Snow</option>
      <option value="rain">Rain</option>
      <option value="thunder">Thunder</option>
    </select>
    <button id="theme">🌙</button>
  </div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message...">
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,collection,addDoc,query,orderBy,onSnapshot,
doc,setDoc,updateDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyB0azRFE5jqdqnWgXBcU9qc3cWbqDkyk1w",
  authDomain:"temp-chat-6f08b.firebaseapp.com",
  projectId:"temp-chat-6f08b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* params */
const p=new URLSearchParams(location.search);
const user=p.get("user");
const room=p.get("room");

/* UI */
const chat=document.getElementById("chat");
const msgInput=document.getElementById("msg");
const info=document.getElementById("info");
const typingUI=document.getElementById("typing");

/* presence */
const presRef=doc(db,"rooms",room,"presence",user);
await setDoc(presRef,{online:true});
window.addEventListener("beforeunload",()=>deleteDoc(presRef));

/* typing system */
const typingRef=doc(db,"rooms",room,"typing",user);

let typingTimeout;

msgInput.addEventListener("input", async () => {
  await setDoc(typingRef,{
    typing:true,
    time:Date.now()
  });

  clearTimeout(typingTimeout);

  typingTimeout=setTimeout(async ()=>{
    await deleteDoc(typingRef);
  },1500);
});

/* show typing users */
onSnapshot(collection(db,"rooms",room,"typing"),snap=>{
  let usersTyping=[];

  snap.forEach(d=>{
    if(d.id !== user){
      usersTyping.push(d.id);
    }
  });

  if(usersTyping.length===0){
    typingUI.innerText="";
  } else if(usersTyping.length===1){
    typingUI.innerText=`${usersTyping[0]} is typing...`;
  } else {
    typingUI.innerText=`${usersTyping.length} people are typing...`;
  }
});

/* online users */
onSnapshot(collection(db,"rooms",room,"presence"),snap=>{
  let users=[];
  snap.forEach(d=>users.push(d.id));
  info.innerText=`${room} • ${users.length} online`;
});

/* send message */
const messagesRef=collection(db,"rooms",room,"messages");

async function send(){
  const text=msgInput.value.trim();
  if(!text)return;

  await addDoc(messagesRef,{
    user,
    text,
    time:Date.now(),
    seenBy:[user]
  });

  msgInput.value="";

  // stop typing immediately after send
  await deleteDoc(typingRef);
}

document.getElementById("sendBtn").onclick=send;

msgInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")send();
});

/* messages */
onSnapshot(query(messagesRef,orderBy("time")),snap=>{
  chat.innerHTML="";

  snap.forEach(docSnap=>{
    const m=docSnap.data();

    const div=document.createElement("div");
    div.className="msg "+(m.user===user?"me":"other");

    div.innerHTML=`
      <div class="bubble">
        <b>${m.user}</b><br>
        ${m.text}
        <div class="meta">
          ${new Date(m.time).toLocaleTimeString()}
        </div>
      </div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
});

/* theme */
document.getElementById("theme").onclick=()=>{
  document.body.classList.toggle("light");
};

/* effects */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
window.onresize=resize;

let mode="none";
effect.onchange=e=>mode=e.target.value;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(mode==="snow"){
    for(let i=0;i<40;i++){
      ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
    }
  }

  if(mode==="rain"){
    for(let i=0;i<60;i++){
      ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1,10);
    }
  }

  if(mode==="thunder"){
    if(Math.random()<0.02){
      ctx.fillStyle="white";
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
  }

  requestAnimationFrame(draw);
}
draw();

</script>
</body>
</html>
